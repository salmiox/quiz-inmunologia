is de la enfermedad hemolítica del recién nacido, ¿qué clase de anticuerpos atraviesan la placenta y se administran como profilaxis?", "opciones": {"a": "IgG (anti-Rh, a las 28 semanas y 72h posparto)", "b": "IgA", "c": "IgM", "d": "IgE"}, "correcta": "a", "razones": {"a": "CORRECTA. Por placenta pasan las {{IgG}}; la profilaxis es {{IgG anti-Rh}} (Rhogam) a las 28 semanas y en las primeras {{72h}} posparto.", "b": "La IgA {{no atraviesa placenta}} (sí se transfiere por leche).", "c": "La {{IgM}} NO atraviesa la placenta (es pentamérica, grande).", "d": "La IgE {{no atraviesa placenta}}."}, "_k": "inmuno-q92:2310577894"}, {"id": "inmuno-q93", "tema": "Alergia/Hipersensibilidad", "examen": "Recull + Verdaguer", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida en varios años", "enunciado": "En la enfermedad **celíaca**, ¿qué respuesta predomina?", "opciones": {"a": "Th2", "b": "Treg", "c": "Th1", "d": "Th17"}, "correcta": "c", "razones": {"a": "{{Th2}} favorece IgE/alergia, no es el perfil celíaco.", "b": "{{Treg}} es supresora.", "c": "CORRECTA. La celiaquía es una respuesta predominantemente {{Th1}} ({{IFN-γ}}) frente a la gliadina/transglutaminasa → destrucción del epitelio (HS IV).", "d": "{{Th17}} participa pero el perfil dominante descrito es Th1."}, "_k": "inmuno-q93:3002470186"}, {"id": "inmuno-q94", "tema": "Alergia/Hipersensibilidad", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "Sobre la **dermatitis de contacto**, ¿qué afirmación es **FALSA**?", "opciones": {"a": "Los individuos con síndrome de Bruton NO son susceptibles de dermatitis de contacto", "b": "Puede haber lesiones en áreas alejadas de la expuesta", "c": "Las células T memoria pueden persistir toda la vida", "d": "Causantes: proteínas, metales y compuestos químicos"}, "correcta": "a", "razones": {"a": "FALSA (= respuesta). La dermatitis de contacto es HS {{IV}} (mediada por {{células T}}); los pacientes con Bruton (déficit de B/Acs) {{SÍ}} pueden padecerla.", "b": "Cierta: puede haber lesiones a distancia ({{id reaction}}).", "c": "Cierta: las {{T memoria}} persisten mucho tiempo.", "d": "Cierta: {{haptenos}} (metales, químicos) que forman neoantígenos."}, "_k": "inmuno-q94:1521150415"}, {"id": "inmuno-q95", "tema": "Alergia/Hipersensibilidad", "examen": "Recull + Verdaguer", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "La **hipersensibilidad de contacto** (HS IV):", "opciones": {"a": "Puede inducir hemólisis grave", "b": "Depende de la formación de neoantígenos (hapteno + proteína propia)", "c": "Es humoral, mediada por IgE", "d": "Se diagnostica por ELISA"}, "correcta": "b", "razones": {"a": "Falsa: no produce hemólisis (eso es {{HS II}}).", "b": "CORRECTA. Los {{haptenos}} se unen a proteínas propias formando {{neoantígenos}} que activan a las células T.", "c": "Falsa: es {{celular}} (T), no humoral/IgE.", "d": "Falsa: no se diagnostica por ELISA, sino por {{patch test}}."}, "_k": "inmuno-q95:367565327"}, {"id": "inmuno-q96", "tema": "Alergia/Hipersensibilidad", "examen": "2º Parcial 2025 (Bloque B)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿Qué prueba **in vivo** es decisiva para diagnosticar una alergia mediada por IgE de tipo inmediato?", "opciones": {"a": "Mantoux", "b": "Test de Coombs directo", "c": "Prueba epicutánea (parche)", "d": "Prick test (lectura a ~20 min)"}, "correcta": "d", "razones": {"a": "El Mantoux explora {{HS IV}} frente a tuberculina.", "b": "El Coombs detecta Acs sobre hematíes ({{HS II}}), no alergia.", "c": "La epicutánea/parche es para HS {{IV}} (dermatitis de contacto, lectura 48-72h).", "d": "CORRECTA. El {{prick test}} explora la HS {{I}} (IgE): roncha y eritema, lectura ~{{20 min}}."}, "_k": "inmuno-q96:723608402"}, {"id": "inmuno-q97", "tema": "Alergia/Hipersensibilidad", "examen": "Recull (per-TEMES)", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "Ante sospecha de **tuberculosis**, ¿qué prueba se realiza?", "opciones": {"a": "Determinación de IgE específica", "b": "Prick test, lectura a 20 min", "c": "Test de Coombs directo", "d": "Inyección intradérmica de tuberculina, lectura a las 72h (Mantoux)"}, "correcta": "d", "razones": {"a": "La IgE específica es para alergia ({{HS I}}).", "b": "El prick es para HS I {{inmediata}}.", "c": "El Coombs es para HS II ({{hemólisis}}).", "d": "CORRECTA. El {{Mantoux}} (PPD intradérmico) es una HS {{retardada (IV)}}: se lee a las {{48-72h}}."}, "_k": "inmuno-q97:1914678476"}, {"id": "inmuno-q98", "tema": "Alergia/Hipersensibilidad", "examen": "Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "Sobre la **histamina**, ¿qué afirmación es **FALSA**?", "opciones": {"a": "Produce vasodilatación, edema y broncoconstricción en la fase inicial", "b": "Está almacenada preformada en gránulos", "c": "Se encuentra en los gránulos de los macrófagos", "d": "Se libera por entrecruzamiento de la IgE"}, "correcta": "c", "razones": {"a": "Cierta: causa {{vasodilatación}}, edema y broncoconstricción inmediatos.", "b": "Cierta: es un mediador {{preformado}}.", "c": "FALSA (= respuesta). La histamina está en los gránulos de {{mastocitos y basófilos}}, NO de los macrófagos.", "d": "Cierta: se libera por {{cross-linking}} de la IgE en FcεRI."}, "_k": "inmuno-q98:703061344"}, {"id": "inmuno-q99", "tema": "Inmunodeficiencias", "examen": "2º Parcial 2025 (Bloque A) + Recull", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Cuál es la **inmunodeficiencia primaria más frecuente**?", "opciones": {"a": "Edema angioneurótico (déficit C1-INH)", "b": "Déficit selectivo de IgA", "c": "Inmunodeficiencia común variable (IDCV)", "d": "SCID"}, "correcta": "b", "razones": {"a": "El edema angioneurótico es {{menos prevalente}} (≈3ª según el profe).", "b": "CORRECTA. El {{déficit selectivo de IgA}} es la inmunodeficiencia primaria más frecuente (la mayoría asintomáticos).", "c": "La {{IDCV}} es la 2ª más frecuente.", "d": "El {{SCID}} es raro (poco prevalente)."}, "_k": "inmuno-q99:3016091854"}, {"id": "inmuno-q100", "tema": "Inmunodeficiencias", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "Según el orden de prevalencia, la **tercera inmunodeficiencia primaria más prevalente** es:", "opciones": {"a": "Edema angioneurótico (déficit C1-inhibidor)", "b": "Déficit selectivo de IgA", "c": "Síndrome de Bruton", "d": "SCID"}, "correcta": "a", "razones": {"a": "CORRECTA. Orden de prevalencia (notas del profe): 1º {{déficit IgA}}, 2º {{IDCV}}, 3º {{edema angioneurótico}}, 4º SCID, 5º Bruton.", "b": "El déficit de IgA es la {{1ª}} más prevalente.", "c": "Bruton es de las {{menos prevalentes}} (≈5ª).", "d": "{{SCID}} es ≈4ª en este orden."}, "_k": "inmuno-q100:1306694589"}, {"id": "inmuno-q101", "tema": "Inmunodeficiencias", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Qué síndrome cursa con **agammaglobulinemia** (ligada al cromosoma X)?", "opciones": {"a": "APECED", "b": "Síndrome de Bruton", "c": "Síndrome de Job", "d": "Síndrome de DiGeorge"}, "correcta": "b", "razones": {"a": "APECED es por {{AIRE}} (autoinmunidad poliendocrina).", "b": "CORRECTA. El {{síndrome de Bruton}} (agammaglobulinemia ligada a X) es por defecto de {{Btk}} → bloqueo de la maduración de los linfocitos B → ausencia de anticuerpos.", "c": "Job (Hiper-IgE) es por {{STAT3}}.", "d": "DiGeorge afecta a los {{linfocitos T}} (hipoplasia tímica)."}, "_k": "inmuno-q101:3059397427"}, {"id": "inmuno-q102", "tema": "Inmunodeficiencias", "examen": "2º Parcial 2025 + Recull + Biomed", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "Un defecto de la **tirosina-quinasa Btk** da lugar a:", "opciones": {"a": "Síndrome de Bruton", "b": "Síndrome de DiGeorge", "c": "SCID", "d": "Síndrome de Hiper-IgM"}, "correcta": "a", "razones": {"a": "CORRECTA. La {{Btk}} (Bruton tyrosine kinase) es esencial para la maduración del linfocito B; su mutación causa la {{agammaglobulinemia de Bruton}}.", "b": "DiGeorge es por deleción {{22q11}} (timo).", "c": "El SCID tiene otras causas ({{cadena γ, ADA, RAG}}).", "d": "El Hiper-IgM es por {{CD40L}}/CD40/AID."}, "_k": "inmuno-q102:1197474499"}, {"id": "inmuno-q103", "tema": "Inmunodeficiencias", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Qué enfermedad cursa con **hipoplasia tímica y de paratiroides, anomalías cardíacas/grandes vasos y deformidad facial**?", "opciones": {"a": "Wiskott-Aldrich", "b": "Síndrome de Bruton", "c": "Chediak-Higashi", "d": "Síndrome de DiGeorge"}, "correcta": "d", "razones": {"a": "Wiskott-Aldrich = {{eccema}}, trombocitopenia, infecciones (WASP).", "b": "Bruton = {{agammaglobulinemia}} (B), sin malformaciones.", "c": "Chediak-Higashi = albinismo parcial + {{gránulos gigantes}} (LYST).", "d": "CORRECTA. El {{síndrome de DiGeorge}} (deleción {{22q11}}, defecto del 3er-4º arco branquial) cursa con hipoplasia tímica/paratiroidea, cardiopatía y dismorfia facial."}, "_k": "inmuno-q103:3460516367"}, {"id": "inmuno-q104", "tema": "Inmunodeficiencias", "examen": "2º Parcial 2025 (Bloque A) + Recull", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿Qué inmunodeficiencia es debida a mutación del gen del **C1 esterasa inhibidor**?", "opciones": {"a": "Déficit del Factor H", "b": "Déficit del Factor I", "c": "Edema angioneurótico hereditario", "d": "Hemoglobinuria paroxística nocturna"}, "correcta": "c", "razones": {"a": "El déficit de Factor H predispone a {{SHU atípico}}/glomerulopatía.", "b": "El déficit de Factor I cursa con consumo de {{C3}}.", "c": "CORRECTA. El déficit de {{C1-INH}} causa el {{angioedema hereditario}} (activación descontrolada de bradicinina/complemento).", "d": "La HPN es por mutación de {{PIG-A}} (falta DAF/CD59)."}, "_k": "inmuno-q104:856710214"}, {"id": "inmuno-q105", "tema": "Inmunodeficiencias", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "En el síndrome **Hiper-IgM (HIGM)**, ¿cuál es la forma debida a déficit de **CD40L**?", "opciones": {"a": "HIGM1", "b": "HIGM5", "c": "HIGM2", "d": "HIGM3"}, "correcta": "a", "razones": {"a": "CORRECTA. El {{HIGM1}} = déficit de {{CD40L}} (ligado a X).", "b": "El HIGM5 = déficit de {{UNG}}.", "c": "El HIGM2 = déficit de {{AID}}.", "d": "El HIGM3 = déficit de {{CD40}}."}, "_k": "inmuno-q105:3876728127"}, {"id": "inmuno-q106", "tema": "Inmunodeficiencias", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Cuál de las siguientes **NO es causa** del síndrome de **Hiper-IgM**?", "opciones": {"a": "Déficit de AID", "b": "Déficit de APRIL", "c": "Déficit de CD40L", "d": "Déficit de CD40"}, "correcta": "b", "razones": {"a": "El déficit de {{AID}} causa HIGM2.", "b": "CORRECTA (= no es causa). {{APRIL}} es señal de supervivencia de plasmáticas; no causa Hiper-IgM.", "c": "El déficit de {{CD40L}} causa HIGM1.", "d": "El déficit de {{CD40}} causa HIGM3."}, "_k": "inmuno-q106:3525335836"}, {"id": "inmuno-q107", "tema": "Inmunodeficiencias", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "El síndrome de **Omenn** se puede dar por mutaciones en los siguientes genes **EXCEPTO**:", "opciones": {"a": "Artemis", "b": "RAG2", "c": "AID", "d": "RAG1"}, "correcta": "c", "razones": {"a": "{{Artemis}} (recombinación V(D)J) causa Omenn.", "b": "El {{RAG2}} hipomórfico causa Omenn.", "c": "CORRECTA (= la excepción). El {{AID}} actúa en la hipermutación/cambio de clase (→ Hiper-IgM), no en la recombinación V(D)J → no causa Omenn.", "d": "El {{RAG1}} hipomórfico causa Omenn."}, "_k": "inmuno-q107:3091233585"}, {"id": "inmuno-q108", "tema": "Inmunodeficiencias", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Qué inmunodeficiencia **NO tiene defectos en la respuesta humoral adaptativa**?", "opciones": {"a": "Déficit de Btk", "b": "Déficit de AID", "c": "Déficit de CD40", "d": "Mutación del gen TAP-1"}, "correcta": "d", "razones": {"a": "El déficit de {{Btk}} → agammaglobulinemia (humoral).", "b": "El déficit de {{AID}} → Hiper-IgM tipo 2 (humoral).", "c": "El déficit de {{CD40}} → Hiper-IgM (afecta la humoral).", "d": "CORRECTA. La mutación de {{TAP-1}} afecta la presentación por {{MHC-I}} → respuesta {{celular/CD8}}, no la humoral."}, "_k": "inmuno-q108:2190722794"}, {"id": "inmuno-q109", "tema": "Inmunodeficiencias", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida en varios años", "enunciado": "Sobre el síndrome de **Chediak-Higashi**, ¿qué afirmación es **FALSA**?", "opciones": {"a": "Es debida a mutación del gen LYST", "b": "Cursa con albinismo oculocutáneo parcial", "c": "Cursa con déficits neurológicos", "d": "Cursa con hipoparatiroidismo"}, "correcta": "d", "razones": {"a": "Cierta: mutación de {{LYST}} (fusión de gránulos lisosomales gigantes).", "b": "Cierta: cursa con {{albinismo oculocutáneo parcial}}.", "c": "Cierta: cursa con {{neuropatía}}/déficits neurológicos.", "d": "FALSA (= respuesta). El {{hipoparatiroidismo}} es de {{DiGeorge}}, NO de Chediak-Higashi."}, "_k": "inmuno-q109:543091281"}, {"id": "inmuno-q110", "tema": "Inmunodeficiencias", "examen": "per-TEMES + Recull", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida (HPN)", "enunciado": "¿Cuál es la causa de la **hemoglobinuria paroxística nocturna (HPN)**?", "opciones": {"a": "Mutación del gen LYST", "b": "Déficit de C1 inhibidor", "c": "Mutación del gen PIG-A (déficit de anclaje GPI → falta de DAF/CD59)", "d": "Déficit de Factor H"}, "correcta": "c", "razones": {"a": "LYST → {{Chediak-Higashi}}.", "b": "El déficit de C1-INH causa {{angioedema}}, no HPN.", "c": "CORRECTA. La HPN es por mutación somática de {{PIG-A}} → sin anclaje {{GPI}} → falta {{DAF (CD55) y CD59}} → lisis de hematíes por complemento.", "d": "Factor H → {{SHU atípico}}/glomerulopatía C3."}, "_k": "inmuno-q110:4030755744"}, {"id": "inmuno-q111", "tema": "Inmunodeficiencias", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿En qué déficit del complemento los pacientes **NO** son propensos a enfermedad por inmunocomplejos?", "opciones": {"a": "Factor D", "b": "C4", "c": "Factor H", "d": "C2"}, "correcta": "a", "razones": {"a": "CORRECTA. El {{Factor D}} es exclusivo de la vía {{alternativa}}; su déficit cursa con infecciones (Neisseria) pero {{NO}} con enfermedad por inmunocomplejos.", "b": "El déficit de {{C4}} (vía clásica) también predispone a inmunocomplejos.", "c": "El déficit de {{Factor H}} (regulador) favorece acúmulo de inmunocomplejos.", "d": "El déficit de {{C2}} (vía clásica) favorece inmunocomplejos (clínica tipo lupus)."}, "_k": "inmuno-q111:2728771064"}, {"id": "inmuno-q112", "tema": "Inmunodeficiencias", "examen": "Recull + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "En caso de **inmunodeficiencia por exposición a radiación severa**, la actitud correcta es:", "opciones": {"a": "Terapia adyuvante con IL-10 y TGF-β para favorecer la inmunocompetencia", "b": "Evaluar el hematocrito y la respuesta linfocítica a estímulos policlonales, y plantear trasplante de médula ósea", "c": "Exponerse a patógenos para estimular la hematopoyesis", "d": "Mantenerse en condiciones estériles esperando recuperación espontánea"}, "correcta": "b", "razones": {"a": "Falsa: la {{IL-10 y el TGF-β}} son {{inmunosupresores}}, empeorarían la situación.", "b": "CORRECTA. Hay que monitorizar el {{hematocrito}} y la respuesta a {{mitógenos policlonales}} y considerar {{trasplante de médula ósea}}.", "c": "Falsa: exponerse a {{patógenos}} sería peligroso en un inmunodeprimido.", "d": "Falsa: la espera pasiva es insuficiente ante una {{mielosupresión}} grave."}, "_k": "inmuno-q112:1063233995"}, {"id": "inmuno-q113", "tema": "Inmunodeficiencias", "examen": "2º Parcial 2025 (Bloque B)", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida (control EBV = CD8+)", "enunciado": "¿Por qué los pacientes con **inmunodeficiencias humorales** no suelen tener problemas con el **Epstein-Barr**?", "opciones": {"a": "Porque los anticuerpos son muy eficaces contra el EBV", "b": "Porque la respuesta contra el EBV es por macrófagos", "c": "Porque el EBV no infecta a estos pacientes", "d": "Porque el control del EBV es poco eficaz por anticuerpos y depende principalmente de los CD8+"}, "correcta": "d", "razones": {"a": "Falsa: los anticuerpos son {{poco}} eficaces contra el EBV.", "b": "Los {{macrófagos}} no son el efector principal anti-EBV.", "c": "Falsa: el EBV sí infecta (vía {{CD21}}); lo que falla en otros es el control celular.", "d": "CORRECTA. El control del EBV depende sobre todo de los {{CD8+}} citotóxicos; los anticuerpos son poco eficaces. Por eso un déficit {{humoral}} puro no compromete especialmente el control del EBV."}, "_k": "inmuno-q113:677836492"}, {"id": "inmuno-q114", "tema": "Inmunodeficiencias", "examen": "2º Parcial 2025 (Bloque A) + Verdaguer", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida (perfil Ig normal)", "enunciado": "En un adulto sano, ¿qué perfil de inmunoglobulinas considerarías **normal**?", "opciones": {"a": "IgG 300, IgA 20, IgM 120 mg/dL, IgE 10 mg/dL", "b": "IgG 2100, IgA 700, IgM 210, IgE 12 mg/dL", "c": "IgG 1200, IgA 300, IgM 210 mg/dL, IgD trazas, IgE 42 UI/mL", "d": "IgG 800, IgA 800, IgM 10 mg/dL, IgE 52 UI/mL"}, "correcta": "c", "razones": {"a": "Falsa: IgG 300 es muy baja ({{hipogammaglobulinemia}}) e IgE en mg (incorrecto).", "b": "Falsa: IgG e IgA {{demasiado altas}}; IgE expresada en mg (unidad incorrecta).", "c": "CORRECTA. Rangos normales del adulto: {{IgG ~700-1600}}, {{IgA ~70-400}}, {{IgM ~40-230}} mg/dL, IgD trazas, e {{IgE en UI/mL}} (no mg).", "d": "Falsa: IgM 10 mg/dL es {{muy baja}} e IgA 800 muy alta."}, "_k": "inmuno-q114:32627470"}, {"id": "inmuno-q115", "tema": "Inmunodeficiencias", "examen": "per-TEMES", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "El **déficit de CD40L** produce:", "opciones": {"a": "Síndrome de DiGeorge", "b": "Síndrome de Hiper-IgM (tipo 1)", "c": "Síndrome de Bruton", "d": "SCID"}, "correcta": "b", "razones": {"a": "DiGeorge es por deleción {{22q11}}.", "b": "CORRECTA. Sin {{CD40L}} (en el linfocito T) no hay señal para el {{cambio de isotipo}} en el B → se acumula IgM = {{Hiper-IgM tipo 1}}.", "c": "Bruton es por {{Btk}}.", "d": "El SCID es por defectos más profundos ({{cadena γ, ADA, RAG}})."}, "_k": "inmuno-q115:884097514"}, {"id": "inmuno-q116", "tema": "Inmunodeficiencias", "examen": "per-TEMES", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "En la **SCID ligada a X (XSCID)**, ¿qué gen **NO** está implicado?", "opciones": {"a": "ADA (adenosina desaminasa)", "b": "Receptor de IL-7", "c": "JAK3", "d": "Cadena γ común del receptor de IL-2"}, "correcta": "a", "razones": {"a": "CORRECTA (= no implicado). El déficit de {{ADA}} causa un SCID {{autosómico recesivo}}, no ligado a X.", "b": "El receptor de {{IL-7}} también causa SCID.", "c": "{{JAK3}} (vía de la γc) causa SCID.", "d": "La {{cadena γ común}} (γc) es la causa más frecuente de XSCID."}, "_k": "inmuno-q116:3499557354"}, {"id": "inmuno-q117", "tema": "Inmunodeficiencias", "examen": "per-TEMES", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "Tras un trasplante de médula con depleción de células T, hay riesgo de **enfermedad linfoproliferativa maligna por EBV**. ¿Por qué?", "opciones": {"a": "Por déficit de linfocitos T CD8+ anti-EBV", "b": "Por déficit de neutrófilos", "c": "Por exceso de anticuerpos anti-EBV", "d": "Por activación del complemento"}, "correcta": "a", "razones": {"a": "CORRECTA. Sin control {{citotóxico (CD8+)}}, el EBV prolifera libremente en los linfocitos B → síndrome linfoproliferativo.", "b": "Los {{neutrófilos}} no controlan la infección por EBV.", "c": "Los {{anticuerpos}} no controlan eficazmente el EBV.", "d": "El {{complemento}} no es el mecanismo de control del EBV."}, "_k": "inmuno-q117:2217883213"}, {"id": "inmuno-q118", "tema": "Subpoblaciones Th/Citocinas", "examen": "2º Parcial 2025 + Recull + Verdaguer", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "Un linfocito T expresa el factor de transcripción **T-bet**. ¿De qué tipo es?", "opciones": {"a": "Treg", "b": "Th2", "c": "Th17", "d": "CD4+ Th1"}, "correcta": "d", "razones": {"a": "El factor de Treg es {{FoxP3}}.", "b": "El factor de Th2 es {{GATA-3}}.", "c": "El factor de Th17 es {{RORγt}}.", "d": "CORRECTA. {{T-bet}} es el factor maestro de los {{Th1}} (IFN-γ, inmunidad celular)."}, "_k": "inmuno-q118:642061576"}, {"id": "inmuno-q119", "tema": "Subpoblaciones Th/Citocinas", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida (factores de transcripción Th)", "enunciado": "¿Qué factor de transcripción encontramos en los linfocitos T CD4+ **Th2**?", "opciones": {"a": "RORγt", "b": "GATA-3", "c": "T-bet", "d": "FoxP3"}, "correcta": "b", "razones": {"a": "{{RORγt}} → Th17.", "b": "CORRECTA. {{GATA-3}} es el factor maestro de {{Th2}} (IL-4 ": "inmuno-q125:2774444673"}, {"id": "inmuno-q126", "tema": "Subpoblaciones Th/Citocinas", "examen": "2º Parcial 2025 + Verdaguer + Recull", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida en varios años", "enunciado": "¿Qué enzima/factor está implicado directamente en la **hipermutación somática**?", "opciones": {"a": "RAG-1", "b": "AIRE", "c": "AID", "d": "GATA-3"}, "correcta": "c", "razones": {"a": "{{RAG-1}} hace la recombinación {{V(D)J}}, no la hipermutación.", "b": "{{AIRE}} es de tolerancia central tímica.", "c": "CORRECTA. La {{AID}} (activation-induced cytidine deaminase) media la {{hipermutación somática}} y el cambio de clase.", "d": "{{GATA-3}} es el factor de Th2."}, "_k": "inmuno-q126:2349191825"}, {"id": "inmuno-q127", "tema": "Subpoblaciones Th/Citocinas", "examen": "Recull + Verdaguer", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Cuál es la **tercera señal** de activación del linfocito T?", "opciones": {"a": "Citocinas secretadas por la APC", "b": "Moléculas de adhesión", "c": "Reconocimiento del antígeno por el TCR (TCR-pMHC)", "d": "Moléculas coestimuladoras (CD28-B7)"}, "correcta": "a", "razones": {"a": "CORRECTA. La señal 3 son las {{citocinas}} de la APC, que polarizan el subtipo Th (IL-12→Th1, IL-4→Th2, etc.).", "b": "Las moléculas de adhesión {{estabilizan}} la sinapsis, no son la 3ª señal.", "c": "El TCR-pMHC es la {{señal 1}}.", "d": "La coestimulación (CD28-B7) es la {{señal 2}}."}, "_k": "inmuno-q127:2551501777"}, {"id": "inmuno-q128", "tema": "Subpoblaciones Th/Citocinas", "examen": "per-TEMES + Recull", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida en varios años", "enunciado": "¿Cuáles son los productos del complemento con alta capacidad de **activar/degranular los mastocitos** (anafilotoxinas)?", "opciones": {"a": "C3b y iC3b", "b": "C1q y C4b", "c": "C5b-C9 (complejo de ataque a membrana)", "d": "C3a y C5a"}, "correcta": "d", "razones": {"a": "C3b/iC3b son {{opsoninas}} (fagocitosis), no anafilotoxinas.", "b": "{{C1q/C4b}} son del inicio de la vía clásica.", "c": "El {{MAC}} (C5b-9) lisa membranas, no es anafilotoxina.", "d": "CORRECTA. {{C3a y C5a}} son las {{anafilotoxinas}}: activan mastocitos/basófilos (vía no-IgE, anafilactoide)."}, "_k": "inmuno-q128:931071780"}, {"id": "inmuno-q129", "tema": "Subpoblaciones Th/Citocinas", "examen": "per-TEMES + Verdaguer", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida en varios años", "enunciado": "¿Qué citocina induce **fiebre** y aumenta las proteínas de fase aguda en el hígado?", "opciones": {"a": "IL-5", "b": "IL-6", "c": "IL-4", "d": "IL-8"}, "correcta": "b", "razones": {"a": "La IL-5 actúa sobre {{eosinófilos}}.", "b": "CORRECTA. La {{IL-6}} es un pirógeno endógeno (junto a {{IL-1 y TNF}}) e induce las proteínas de {{fase aguda}}.", "c": "La IL-4 es citocina {{Th2}} (no pirógena principal).", "d": "La IL-8 es {{quimiotáctica}} de neutrófilos, no pirógena."}, "_k": "inmuno-q129:764416188"}, {"id": "inmuno-q130", "tema": "Subpoblaciones Th/Citocinas", "examen": "per-TEMES + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿Cuál es la causa del aumento de la **VSG** (velocidad de sedimentación globular)?", "opciones": {"a": "Descenso de las inmunoglobulinas", "b": "Disminución del fibrinógeno", "c": "Aumento de la albúmina", "d": "Aumento de las proteínas de fase aguda"}, "correcta": "d", "razones": {"a": "Las inmunoglobulinas pueden subir, pero el motor clásico es el {{fibrinógeno}}/fase aguda.", "b": "El fibrinógeno {{aumenta}} (no disminuye) en la inflamación.", "c": "La albúmina {{disminuye}} en la fase aguda.", "d": "CORRECTA. El aumento de {{proteínas de fase aguda}} (sobre todo {{fibrinógeno}}) hace que los hematíes sedimenten más rápido → VSG elevada."}, "_k": "inmuno-q130:3496476525"}];
const app = document.getElementById("app");
const filtro = document.getElementById("filtro");
const frec = document.getElementById("frec");
const marc = document.getElementById("marc");
const SKEY = "inmuno_starred_v1";
let starred = new Set(JSON.parse(localStorage.getItem(SKEY) || "[]"));
function saveStars(){ localStorage.setItem(SKEY, JSON.stringify([...starred])); }
// **x** → palabra clave resaltada ; {{x}} → palabra clave ocluida (cloze)
function esc(s){return String(s==null?"":s);}
function fmt(s){
  s = esc(s);
  s = s.replace(/\*\*([^*]+)\*\*/g, '<span class="kw">$1</span>');
  s = s.replace(/\{\{([^}]+)\}\}/g, '<span class="cloze" title="click para revelar">$1</span>');
  return s;
}
const TEMAS = ["Evasión/Patógenos","VIH","Tumoral","Trasplante","Autoinmunidad","Alergia/Hipersensibilidad","Inmunodeficiencias","Subpoblaciones Th/Citocinas"];
TEMAS.filter(t=>DATA.some(q=>q.tema===t)).forEach(t=>{
  const o=document.createElement("option");o.value=t;o.textContent=t;filtro.appendChild(o);});
[...new Set(DATA.map(q=>q.tema))].filter(t=>!TEMAS.includes(t)).sort().forEach(t=>{
  const o=document.createElement("option");o.value=t;o.textContent=t;filtro.appendChild(o);});
function render(){
  const f = filtro.value, fr = frec.value, mk = marc.value;
  const list = DATA.filter(q=>(!f||q.tema===f) &&
    (fr!=="alta" || q.alta_frecuencia) &&
    (mk!=="si" || starred.has(q._k)));
  document.getElementById("count").textContent = list.length+" preguntas · 🌟 "+starred.size+" marcadas";
  app.innerHTML = "";
  list.forEach((q,i)=>{
    const card=document.createElement("div");card.className="card";
    const alta = q.alta_frecuencia?' · <span class="alta">⭐ ALTA FRECUENCIA</span>':'';
    const rep = q.repetida?' · '+q.repetida:'';
    const L=Object.keys(q.opciones).sort();
    let opts="";
    L.forEach(l=>opts+=`<div class="opt" data-l="${l}"><b>${l.toUpperCase()})</b> ${fmt(q.opciones[l])}</div>`);
    let raz="";
    L.forEach(l=>{if(q.razones&&q.razones[l]!==undefined)raz+=`<div class="razon" data-l="${l}"><b>${l.toUpperCase()})</b> ${fmt(q.razones[l])}</div>`;});
    const on = starred.has(q._k);
    card.innerHTML=`<div class="chead">
        <span class="qnum">Nº ${i+1} / ${list.length}</span>
        <div class="meta">${q.examen} · ${q.tema}${alta}${rep}</div>
        <button class="star${on?' on':''}" title="Marcar como difícil">${on?'★':'☆'}</button>
      </div>
      <div class="preg">${fmt(q.enunciado)}</div>
      <div class="opts">${opts}</div>
      <div class="hint">👆 Toca tu respuesta para ver el razonamiento.</div>
      <div class="resp"><button class="reveal-words">👁 Revelar palabras clave</button><div class="razon-wrap">${raz}</div></div>`;
    // estrella
    const starBtn=card.querySelector(".star");
    starBtn.onclick=()=>{
      if(starred.has(q._k)){starred.delete(q._k);} else {starred.add(q._k);}
      saveStars();
      const now=starred.has(q._k);
      starBtn.classList.toggle("on",now);starBtn.textContent=now?'★':'☆';
      document.getElementById("count").textContent=app.querySelectorAll(".card").length+" preguntas · 🌟 "+starred.size+" marcadas";
      if(marc.value==="si"&&!now)render();
    };
    // click en opción → revela al instante
    const optEls=card.querySelectorAll(".opt");
    const resp=card.querySelector(".resp");
    const hint=card.querySelector(".hint");
    let answered=false;
    optEls.forEach(o=>o.onclick=()=>{
      if(answered)return; answered=true;
      const chosen=o.dataset.l;
      optEls.forEach(x=>{const l=x.dataset.l;
        x.classList.add(l===q.correcta?"ok":"no");
        if(l===chosen)x.classList.add("mine");
        if(l===chosen&&l===q.correcta){x.insertAdjacentHTML("beforeend",'<span class="tag cor">✓ tu respuesta · correcta</span>');}
        else{
          if(l===chosen)x.insertAdjacentHTML("beforeend",'<span class="tag you">tu respuesta</span>');
          if(l===q.correcta)x.insertAdjacentHTML("beforeend",'<span class="tag cor">correcta</span>');
        }
      });
      hint.style.display="none";
      resp.classList.add("show");
    });
    // cloze: click individual para revelar/ocultar
    resp.querySelectorAll(".cloze").forEach(c=>c.onclick=()=>c.classList.toggle("revealed"));
    // botón revelar/ocultar todas
    resp.querySelector(".reveal-words").onclick=(e)=>{
      const cs=resp.querySelectorAll(".cloze");
      const anyHidden=[...cs].some(c=>!c.classList.contains("revealed"));
      cs.forEach(c=>c.classList.toggle("revealed",anyHidden));
      e.target.textContent = anyHidden ? "🙈 Ocultar palabras clave" : "👁 Revelar palabras clave";
    };
    app.appendChild(card);
  });
  updatePos();
}
// contador en vivo: detecta la tarjeta que está arriba del todo y muestra posición + cuántas quedan
function updatePos(){
  const cards=app.querySelectorAll(".card");
  const pos=document.getElementById("pos");
  const n=cards.length;
  if(!n){pos.textContent="";return;}
  const thr=document.querySelector("header").offsetHeight+10;
  let cur=0;
  for(let i=0;i<n;i++){ if(cards[i].getBoundingClientRect().top<=thr) cur=i; else break; }
  // si estás al final del scroll, fija la última (las últimas tarjetas no llegan a subir hasta arriba)
  if(window.innerHeight+window.scrollY>=document.documentElement.scrollHeight-4) cur=n-1;
  pos.textContent=`📍 ${cur+1} / ${n} · quedan ${n-1-cur}`;
}
let _ticking=false;
window.addEventListener("scroll",()=>{ if(!_ticking){_ticking=true;requestAnimationFrame(()=>{updatePos();_ticking=false;});} },{passive:true});
filtro.onchange=render;frec.onchange=render;marc.onchange=render;render();
</script></body></html>
