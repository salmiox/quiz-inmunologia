<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Banco Inmunología · 2º Parcial</title>
<style>
:root{--blue:#2c6fbf;--green:#27ae60;--red:#e74c3c}
*{box-sizing:border-box}
body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#eef2f7;color:#1a2b3c;
     margin:0;line-height:1.45}
header{background:var(--blue);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:10;
       box-shadow:0 2px 8px rgba(0,0,0,.15)}
header h1{margin:0;font-size:18px}
.bar{max-width:780px;margin:0 auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.bar select{padding:6px 10px;border-radius:6px;border:none;font-size:15px}
.bar .count{margin-left:auto;font-size:14px;opacity:.9}
.bar .pos{font-size:14px;font-weight:800;background:rgba(255,255,255,.22);padding:3px 11px;border-radius:14px;white-space:nowrap}
main{max-width:780px;margin:18px auto;padding:0 14px}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:18px;margin-bottom:18px}
.meta{font-size:12px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--blue);margin-bottom:8px}
.alta{color:var(--red)}
.chead{display:flex;align-items:flex-start;gap:10px}
.chead .meta{flex:1}
.qnum{flex:none;background:var(--blue);color:#fff;font-weight:800;font-size:12.5px;padding:3px 10px;border-radius:20px;line-height:1.35;white-space:nowrap}
.star{cursor:pointer;background:none;border:none;font-size:24px;line-height:1;padding:0;color:#cfd8e3;flex:none;transition:.12s}
.star:hover{transform:scale(1.15)}
.star.on{color:#f1c40f}
.preg{font-weight:600;font-size:17px;margin-bottom:12px}
/* palabra clave resaltada en enunciados/opciones */
.kw{font-weight:800;text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:2px;text-decoration-color:#1a2b3c}
.opt{border:1px solid #d8e0ea;border-radius:9px;padding:10px 12px;margin:7px 0;cursor:pointer;
     background:#f7fafd;transition:.12s;font-size:15.5px}
.opt:hover{border-color:var(--blue)}
.opt b{margin-right:6px}
.opt.ok{background:#e8f7ec;border-left:4px solid var(--green)}
.opt.no{background:#fdecea;border-left:4px solid var(--red);opacity:.9}
.opt.mine{box-shadow:0 0 0 2px var(--blue) inset}
.tag{display:inline-block;font-size:11px;font-weight:800;padding:1px 8px;border-radius:10px;margin-left:8px;
     vertical-align:middle;text-transform:uppercase;letter-spacing:.3px}
.tag.you{background:var(--blue);color:#fff}
.tag.cor{background:var(--green);color:#fff}
.hint{font-size:13px;color:#8a98a8;margin-top:6px;font-style:italic}
.resp{margin-top:14px;display:none}
.resp.show{display:block}
.razon{font-size:14.5px;color:#33485c;margin:5px 0 5px 4px}
.reveal-words{margin:2px 0 12px 0;background:#fff;color:var(--blue);border:1px solid var(--blue);
     padding:7px 14px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600}
.reveal-words:hover{background:#e8f1fb}
/* oclusión cloze: barra que tapa la palabra clave hasta hacer click */
.cloze{background:#33485c;color:transparent;border-radius:4px;padding:0 3px;cursor:pointer;
       user-select:none;transition:.12s;-webkit-box-decoration-break:clone;box-decoration-break:clone}
.cloze::selection{color:transparent;background:#33485c}
.cloze:hover{background:#27425e}
.cloze.revealed{background:#fff3cd;color:#7a5b00;font-weight:700;cursor:default}
.cloze.revealed::selection{color:#7a5b00;background:#ffe08a}
</style></head><body>
<header><div class="bar">
  <h1>🛡️ Banco Inmunología · 2º Parcial</h1>
  <label>Tema:
    <select id="filtro"><option value="">Todos</option></select>
  </label>
  <label>Frecuencia:
    <select id="frec">
      <option value="">Todas</option>
      <option value="alta">⭐ Solo alta frecuencia</option>
    </select>
  </label>
  <label>Mis marcadas:
    <select id="marc">
      <option value="">Todas</option>
      <option value="si">🌟 Solo mis marcadas</option>
    </select>
  </label>
  <span class="count" id="count"></span>
  <span class="pos" id="pos"></span>
</div></header>
<main id="app"></main>
<script>
const DATA = [{"id": "inmuno-q01", "tema": "Evasión/Patógenos", "examen": "2º Parcial 2025 + Recull + Verdaguer", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en 2021, Recull y Verdaguer", "enunciado": "¿Cuál es el receptor (molécula de membrana) que usa el **virus Epstein-Barr (EBV)** para infectar el linfocito B?", "opciones": {"a": "CD21", "b": "ICAM-1", "c": "CD20", "d": "CD19"}, "correcta": "a", "razones": {"a": "CORRECTA. El EBV usa {{CD21}} (= {{CR2}}, receptor del complemento que liga C3d) para infectar el linfocito B. Es de las preguntas MÁS repetidas del parcial.", "b": "ICAM-1 es el receptor del {{rinovirus}}, no del EBV.", "c": "CD20 es la diana del {{rituximab}}, no el receptor del EBV.", "d": "CD19 es {{correceptor del BCR}}, pero NO es la puerta de entrada del EBV."}, "_k": "inmuno-q01:523304828"}, {"id": "inmuno-q02", "tema": "Evasión/Patógenos", "examen": "Recull + Verdaguer 2021", "anio": 2021, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida en 2021", "enunciado": "¿Cuál es otro nombre de la molécula **CD21**?", "opciones": {"a": "CR3", "b": "CR2", "c": "CR1", "d": "CR4"}, "correcta": "b", "razones": {"a": "{{CR3}} (CD11b/CD18, integrina) es un receptor fagocítico de C3b/iC3b.", "b": "CORRECTA. CD21 = {{CR2}} = receptor del complemento 2 (liga {{C3d}}); es correceptor del BCR y receptor del {{EBV}}.", "c": "{{CR1}} (CD35) liga C3b/C4b; no es CD21.", "d": "{{CR4}} (CD11c/CD18) es otra integrina fagocítica, no CD21."}, "_k": "inmuno-q02:1980811283"}, {"id": "inmuno-q03", "tema": "Evasión/Patógenos", "examen": "2º Parcial 2025 + Verdaguer 2021", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida en 2021", "enunciado": "¿Cuál es el receptor de membrana que le permite al **rinovirus** infectar una célula?", "opciones": {"a": "ACE-2", "b": "LFA-1", "c": "ICAM-1", "d": "ICAM-2"}, "correcta": "c", "razones": {"a": "ACE-2 es el receptor del {{SARS-CoV-2}}, no del rinovirus.", "b": "{{LFA-1}} es el ligando de ICAM, una integrina leucocitaria, no receptor viral.", "c": "CORRECTA. La mayoría de rinovirus (los del grupo mayor) usan {{ICAM-1}} como receptor de entrada en el epitelio respiratorio.", "d": "{{ICAM-2}} no es el receptor del rinovirus."}, "_k": "inmuno-q03:3942773596"}, {"id": "inmuno-q04", "tema": "Evasión/Patógenos", "examen": "2º Parcial 2025 + Verdaguer 2021", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en 2021", "enunciado": "¿Qué patógeno lleva a cabo **variación antigénica** expresando distintas variantes de **VSG** (glicoproteína variante específica)?", "opciones": {"a": "Trypanosoma brucei", "b": "Treponema pallidum", "c": "Listeria monocytogenes", "d": "Streptococcus pneumoniae"}, "correcta": "a", "razones": {"a": "CORRECTA. {{Trypanosoma brucei}} es el paradigma de variación antigénica: cambia su capa de {{VSG}} (variant surface glycoprotein) por recombinación génica para escapar de los anticuerpos.", "b": "Treponema pallidum evade por {{camuflaje}} y escasez de antígenos de superficie.", "c": "Listeria escapa al {{citosol}} (evita el fagolisosoma), no usa VSG.", "d": "El neumococo varía su {{cápsula}} polisacarídica (>90 serotipos), no VSG."}, "_k": "inmuno-q04:1376591106"}, {"id": "inmuno-q05", "tema": "Evasión/Patógenos", "examen": "Recull + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Cuál de los siguientes **NO establece latencia** como mecanismo de evasión?", "opciones": {"a": "Varicela-Zóster", "b": "Virus Influenza", "c": "Epstein-Barr", "d": "Herpes simple"}, "correcta": "b", "razones": {"a": "El VVZ establece latencia en {{ganglios sensitivos}} (se reactiva como herpes zóster).", "b": "CORRECTA. El virus de la {{gripe}} (Influenza) evade por {{variación antigénica}} (drift/shift de hemaglutinina y neuraminidasa), NO por latencia.", "c": "El EBV queda latente en los {{linfocitos B}} de memoria.", "d": "El herpes simple permanece latente en {{neuronas}} ganglionares."}, "_k": "inmuno-q05:2363540690"}, {"id": "inmuno-q06", "tema": "Evasión/Patógenos", "examen": "Verdaguer 13-14", "anio": 2014, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿Qué patógeno se caracteriza por **establecer latencia** como mecanismo de evasión?", "opciones": {"a": "Streptococcus pneumoniae", "b": "Virus Influenza", "c": "Trypanosoma brucei", "d": "Virus de la varicela (VVZ)"}, "correcta": "d", "razones": {"a": "El neumococo varía su {{cápsula}}.", "b": "Influenza usa {{variación antigénica}} (drift/shift), no latencia.", "c": "Trypanosoma cambia su {{VSG}} (variación antigénica).", "d": "CORRECTA. El {{VVZ}} (herpesvirus) establece latencia en ganglios y se reactiva como zóster."}, "_k": "inmuno-q06:1454658428"}, {"id": "inmuno-q07", "tema": "Evasión/Patógenos", "examen": "Recull + Verdaguer", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "El **bloqueo de la presentación de antígenos virales mediante el bloqueo de las moléculas TAP** es propio de:", "opciones": {"a": "Virus Herpes Simple (HSV)", "b": "Epstein-Barr", "c": "VIH", "d": "Varicela-Zóster"}, "correcta": "a", "razones": {"a": "CORRECTA. La proteína {{ICP47}} del HSV bloquea {{TAP}} (transportador de péptidos al retículo) impidiendo cargar péptidos en {{MHC-I}} → escape de los CD8+.", "b": "El EBV evade sobre todo por latencia y por {{vIL-10}}, no por bloqueo de TAP.", "c": "El VIH baja MHC-I por {{Nef}}, no por bloqueo de TAP.", "d": "El VVZ no es el ejemplo canónico de bloqueo de {{TAP}}."}, "_k": "inmuno-q07:2595740737"}, {"id": "inmuno-q08", "tema": "Evasión/Patógenos", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Qué patógeno genera una molécula **homóloga a la IL-10** llamada **vIL-10**?", "opciones": {"a": "Virus Vaccinia", "b": "Treponema pallidum", "c": "VIH", "d": "Virus Epstein-Barr"}, "correcta": "d", "razones": {"a": "El virus Vaccinia secreta receptores señuelo de citocinas, pero el vIL-10 clásico es del {{EBV}}.", "b": "Treponema no produce {{vIL-10}}.", "c": "El VIH no codifica una {{IL-10 viral}}.", "d": "CORRECTA. El EBV codifica {{BCRF1}} = {{vIL-10}}, homólogo viral de la IL-10 (citocina inmunosupresora) → frena la respuesta Th1/inflamatoria."}, "_k": "inmuno-q08:2971198354"}, {"id": "inmuno-q09", "tema": "Evasión/Patógenos", "examen": "Recull + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Qué microorganismo **NO utiliza la variación antigénica** como mecanismo de evasión?", "opciones": {"a": "Trypanosoma", "b": "Herpesvirus", "c": "Streptococcus pneumoniae", "d": "Virus Influenza"}, "correcta": "b", "razones": {"a": "Trypanosoma cambia su {{VSG}}.", "b": "CORRECTA. Los {{herpesvirus}} evaden por {{latencia}}, no por variación antigénica.", "c": "El neumococo varía su {{cápsula}} polisacarídica.", "d": "Influenza varía {{hemaglutinina}}/neuraminidasa (drift/shift)."}, "_k": "inmuno-q09:1861878572"}, {"id": "inmuno-q10", "tema": "Evasión/Patógenos", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "En relación a los virus patógenos potenciales para el ser humano, ¿qué afirmación es **FALSA**?", "opciones": {"a": "Según la especie pueden producir infecciones agudas, latentes o crónicas", "b": "El receptor vírico y su ligando celular determinan la especificidad de especie y el tropismo celular", "c": "Pueden secretar moléculas que bloquean la presentación de MHC-I pero NO de MHC-II", "d": "Pueden inducir acción citopática directa de la célula infectada"}, "correcta": "c", "razones": {"a": "Cierta: hay infecciones agudas, {{latentes}} y crónicas.", "b": "Cierta: el par receptor-ligando define el {{tropismo}} y la especificidad de especie.", "c": "FALSA (= respuesta). Los virus bloquean la presentación tanto de {{MHC-I}} (escape de CD8) {{como de MHC-II}}. Afirmar 'I pero no II' es falso.", "d": "Cierta: muchos virus tienen efecto {{citopático}} directo."}, "_k": "inmuno-q10:451868752"}, {"id": "inmuno-q11", "tema": "Evasión/Patógenos", "examen": "Recull + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida (mononucleosis)", "enunciado": "En relación a los **anticuerpos heterófilos** (mononucleosis infecciosa por EBV), ¿qué afirmación es **FALSA**?", "opciones": {"a": "Son de tipo IgG", "b": "Reaccionan de forma cruzada con antígenos de otras especies (hematíes de oveja, cabra, caballo)", "c": "Se deben a activación policlonal de linfocitos B", "d": "Se encuentran en la infección por EBV (test de Paul-Bunnell)"}, "correcta": "a", "razones": {"a": "FALSA (= respuesta). Los anticuerpos heterófilos son de tipo {{IgM}}, de baja afinidad, no IgG.", "b": "Cierta: tienen reactividad {{cruzada}} con hematíes de otras especies.", "c": "Cierta: surgen por activación {{policlonal}} de los linfocitos B infectados.", "d": "Cierta: aparecen en la mononucleosis y se detectan con el test de {{Paul-Bunnell}}."}, "_k": "inmuno-q11:3607284296"}, {"id": "inmuno-q12", "tema": "Evasión/Patógenos", "examen": "Recull + per-TEMES", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida (mononucleosis)", "enunciado": "En relación a la **mononucleosis infecciosa**, ¿qué afirmación es **FALSA**?", "opciones": {"a": "Los linfocitos atípicos se llaman células de Downey-McKinlay", "b": "Los pacientes con agammaglobulinemia ligada a X sufren mononucleosis fulminante", "c": "Período de incubación largo (30-50 días)", "d": "Está causada por el EBV"}, "correcta": "b", "razones": {"a": "Cierta: los linfocitos reactivos atípicos son las células de {{Downey-McKinlay}}.", "b": "FALSA (= respuesta). Los pacientes con agammaglobulinemia de Bruton {{NO}} hacen mononucleosis fulminante: el control del EBV depende de los {{CD8+}}, no de anticuerpos. El cuadro fulminante por EBV es el síndrome linfoproliferativo ligado a X ({{Duncan}}, mutación SH2D1A).", "c": "Cierta: la incubación es {{larga}} (30-50 días).", "d": "Cierta: el agente es el {{EBV}}."}, "_k": "inmuno-q12:2527309022"}, {"id": "inmuno-q13", "tema": "Evasión/Patógenos", "examen": "2º Parcial 2025 (Bloque B) + per-TEMES", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "Un **shock** desencadenado por la entrada de un **superantígeno** (con liberación masiva de citocinas) es un:", "opciones": {"a": "Shock anafilactoide", "b": "Shock séptico", "c": "Síndrome del shock tóxico", "d": "Shock anafiláctico"}, "correcta": "c", "razones": {"a": "El anafilactoide es activación mastocitaria {{NO mediada por IgE}}.", "b": "El shock séptico es por {{endotoxina}}/PAMPs sobre la inmunidad innata.", "c": "CORRECTA. El {{superantígeno}} (p.ej. {{TSST-1}}) une MHC-II con el TCR fuera del surco, activando masivamente a los linfocitos T → {{tormenta de citocinas}} (TNF-α) → síndrome del shock tóxico.", "d": "El shock anafiláctico es por {{IgE-mastocito}} (alérgeno)."}, "_k": "inmuno-q13:2105184295"}, {"id": "inmuno-q14", "tema": "Evasión/Patógenos", "examen": "2º Parcial 2025 (Bloque B)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿Cuáles son los potenciales mecanismos de daño hepático en el **síndrome del shock tóxico**?", "opciones": {"a": "Solo hipoperfusión tisular", "b": "Solo apoptosis inducida por Fas", "c": "Apoptosis inducida por Fas, apoptosis por TNF-α e hipoperfusión tisular (todas)", "d": "Ninguno de los mecanismos anteriores"}, "correcta": "c", "razones": {"a": "Incompleta: la {{hipoperfusión}} es solo uno de los mecanismos.", "b": "Incompleta: {{Fas}} es solo uno de los mecanismos.", "c": "CORRECTA. El shock tóxico daña el hígado por {{apoptosis vía Fas}}, {{apoptosis por TNF-α}} (tormenta de citocinas) e {{hipoperfusión}} tisular (las tres).", "d": "Falsa: sí existen {{mecanismos de daño}} (los tres mecanismos son reales)."}, "_k": "inmuno-q14:721651099"}, {"id": "inmuno-q15", "tema": "Evasión/Patógenos", "examen": "2º Parcial 2025 (Bloque B) + Recull", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "En la **lepra lepromatosa**, ¿qué respuesta predomina?", "opciones": {"a": "Th1", "b": "Th17", "c": "Treg", "d": "Th2"}, "correcta": "d", "razones": {"a": "Th1 es el perfil de la forma {{tuberculoide}} (pocos bacilos, IFN-γ, buen control). ¡Trampa clásica de inversión!", "b": "{{Th17}} no caracteriza la lepra lepromatosa.", "c": "{{Treg}} no es la respuesta dominante que define la forma clínica.", "d": "CORRECTA. La lepra lepromatosa (diseminada, muchos bacilos, foam cells) tiene perfil {{Th2}} (IL-4, IL-5, IL-10) → mal control de la infección."}, "_k": "inmuno-q15:682830736"}, {"id": "inmuno-q16", "tema": "Evasión/Patógenos", "examen": "2º Parcial 2025 (Bloque B)", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Concepto repetido (lepra Th1/Th2)", "enunciado": "¿Qué citocinas podrían ser útiles como tratamiento de la **lepra lepromatosa**?", "opciones": {"a": "IL-12 e IL-10", "b": "IL-12 e IFN-γ", "c": "IL-4 e IL-10", "d": "IFN-γ e IL-4"}, "correcta": "b", "razones": {"a": "{{IL-10}} es inmunosupresora/Th2; no ayuda.", "b": "CORRECTA. La lepromatosa es {{Th2}} (mala defensa); revertirla hacia {{Th1}} con {{IL-12 e IFN-γ}} mejoraría el control del bacilo.", "c": "IL-4 e IL-10 son ambas {{Th2}}/supresoras: empeorarían la lepromatosa.", "d": "IL-4 es citocina {{Th2}}; empeoraría el perfil."}, "_k": "inmuno-q16:366277317"}, {"id": "inmuno-q17", "tema": "Evasión/Patógenos", "examen": "Recull", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "En relación a la **lepra**, ¿qué afirmación es **FALSA**?", "opciones": {"a": "En la forma tuberculoide predomina Th1 (IL-2, IFN-γ); en la lepromatosa Th2 (IL-4, IL-5, IL-10)", "b": "Está causada por M. leprae, que coloniza macrófagos", "c": "M. leprae crece mejor a 30 ºC → afecta extremidades y áreas frías", "d": "En la tuberculoide predomina Th2 (IL-4, IL-5, IL-10); en la lepromatosa Th1 (IL-2, IFN-γ, TNF-β)"}, "correcta": "d", "razones": {"a": "Cierta: {{tuberculoide = Th1}}, {{lepromatosa = Th2}} (sentido correcto).", "b": "Cierta: M. leprae es {{intracelular}} y coloniza macrófagos.", "c": "Cierta: prefiere ~30 ºC, por eso afecta {{zonas frías}} (piel, nervios periféricos).", "d": "FALSA (= respuesta). Está {{invertido}}: la tuberculoide es Th1 y la lepromatosa es Th2. Es la trampa estrella."}, "_k": "inmuno-q17:2344734541"}, {"id": "inmuno-q18", "tema": "Evasión/Patógenos", "examen": "per-TEMES", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿Cuál de los siguientes **NO es un mecanismo de evasión** del sistema inmune?", "opciones": {"a": "Activación de la apoptosis mediada por el sistema inmune", "b": "Variación antigénica", "c": "Bloqueo de la presentación antigénica", "d": "Establecimiento de latencia"}, "correcta": "a", "razones": {"a": "CORRECTA (= la que NO es evasión). Lo que evade es la {{inhibición}} de la apoptosis (mantener viva la célula infectada); 'activarla' favorecería al sistema inmune.", "b": "Sí es evasión ({{Trypanosoma}}, Influenza).", "c": "Sí es evasión (HSV bloquea {{TAP}}; bloqueo de MHC-I/II).", "d": "Sí es evasión ({{herpesvirus}}, VIH)."}, "_k": "inmuno-q18:1171762023"}, {"id": "inmuno-q19", "tema": "VIH", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "En relación al **VIH**, ¿qué afirmación es **CIERTA**?", "opciones": {"a": "Para entrar en la célula, la gp120 se une a CD4 y a CCR4 o CXCR5", "b": "Su genoma es una cadena de RNA bicatenario con 11 genes", "c": "Los linfocitos T CD4+ que se destruyen más precozmente son los de la mucosa intestinal (GALT)", "d": "Se transmite preferentemente por vía respiratoria"}, "correcta": "c", "razones": {"a": "Falsa: los correceptores correctos son {{CCR5 y CXCR4}}, no CCR4/CXCR5.", "b": "Falsa: el genoma es {{RNA monocatenario +}} (retrovirus).", "c": "CORRECTA. La depleción más precoz y masiva de CD4+ ocurre en el tejido linfoide asociado a mucosa intestinal ({{GALT}}).", "d": "Falsa: la transmisión es {{sexual, sanguínea y vertical}}, no respiratoria."}, "_k": "inmuno-q19:2052277193"}, {"id": "inmuno-q20", "tema": "VIH", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "En relación a la infección por **VIH**, ¿qué afirmación es **CIERTA**?", "opciones": {"a": "Las infecciones oportunistas son características del período de latencia", "b": "El descenso de CD4 es mayor en sangre que en mucosas", "c": "Los VIH X4 actúan en las etapas iniciales de la infección", "d": "La replicación del VIH es más alta en linfocitos T activados"}, "correcta": "d", "razones": {"a": "Falsa: las oportunistas son de la fase {{SIDA}} (avanzada), no de la latencia.", "b": "Falsa: la depleción de CD4 es mayor y más precoz en {{mucosas (GALT)}} que en sangre.", "c": "Falsa: al inicio dominan los virus {{R5/CCR5}} (M-trópicos); X4 son tardíos.", "d": "CORRECTA. El VIH replica mejor en los CD4+ {{activados}} (maquinaria transcripcional NF-κB disponible)."}, "_k": "inmuno-q20:2917276561"}, {"id": "inmuno-q21", "tema": "VIH", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Qué factor genético da **resistencia al desarrollo del SIDA**?", "opciones": {"a": "El alelo Δ32 (delta-32) de CCR5", "b": "El alelo HLA-B35", "c": "El alelo In1.1c de CCL5", "d": "Homocigosis HLA-A/B/C"}, "correcta": "a", "razones": {"a": "CORRECTA. La deleción {{CCR5-Δ32}} en homocigosis impide expresar el correceptor {{CCR5}} → bloquea la entrada de cepas R5 → resistencia.", "b": "Falsa: HLA-B35 se asocia a {{peor evolución}}, no a resistencia.", "c": "Falsa: distractor sin {{valor protector}} demostrado.", "d": "Falsa: la homocigosis HLA {{empobrece}} la presentación; no protege."}, "_k": "inmuno-q21:3910780808"}, {"id": "inmuno-q22", "tema": "VIH", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "En relación al **VIH**, ¿qué afirmación es **CIERTA**?", "opciones": {"a": "Los progresores rápidos destacan por la mutación CCR5Δ32 en homocigosis", "b": "La terapia HAART se ha dejado de usar porque incrementa la actividad viral", "c": "Los pacientes con progresión rápida son los HLA-B27+", "d": "Todas las anteriores son falsas"}, "correcta": "d", "razones": {"a": "Falsa: el {{CCR5Δ32}} homocigoto da {{resistencia}}, no progresión rápida.", "b": "Falsa: la {{HAART/TAR}} sigue siendo el estándar de tratamiento.", "c": "Falsa: la progresión rápida no se define por {{HLA-B27}}.", "d": "CORRECTA. {{Todas son falsas}}. El profe usa la opción 'todas falsas' cuando cada afirmación tiene un fallo."}, "_k": "inmuno-q22:2052277193"}, {"id": "inmuno-q23", "tema": "VIH", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "En relación al **VIH**, ¿qué afirmación es **CIERTA**?", "opciones": {"a": "Es correcto usar 'SIDA' como sinónimo de infección por VIH", "b": "Los anticuerpos anti-VIH son en general bastante eficientes en el control de la infección", "c": "La respuesta inmunitaria más efectiva contra el VIH la llevan a cabo los linfocitos T CD8+", "d": "La transmisión vertical es anecdótica"}, "correcta": "c", "razones": {"a": "Falsa: SIDA = fase {{avanzada}}, no es sinónimo de infección por VIH.", "b": "Falsa: los anticuerpos anti-VIH son poco {{neutralizantes}}.", "c": "CORRECTA. La respuesta {{CD8+ citotóxica}} es la más efectiva en el control (aunque insuficiente a largo plazo).", "d": "Falsa: la transmisión vertical es {{relevante}} (objeto de profilaxis), no anecdótica."}, "_k": "inmuno-q23:2052277193"}, {"id": "inmuno-q24", "tema": "VIH", "examen": "Biomed + Recull", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "Concepto repetido (tropismo R5/X4)", "enunciado": "En relación al tropismo del **VIH**, ¿qué afirmación es **FALSA**?", "opciones": {"a": "Los virus X4 son T-trópicos y usan CXCR4", "b": "Los virus R5 son T-trópicos y usan CXCR4", "c": "Los virus R5 son M-trópicos y usan CCR5", "d": "Los virus R5 predominan al inicio de la infección"}, "correcta": "b", "razones": {"a": "Cierta: X4 = T-trópico = {{CXCR4}} (cepas tardías).", "b": "FALSA (= respuesta). Está invertido: los {{R5}} son {{M-trópicos}} y usan {{CCR5}} (no T-trópicos/CXCR4). Trampa recurrente.", "c": "Cierta: R5 = M-trópico = {{CCR5}}.", "d": "Cierta: las cepas R5 dominan en la transmisión y fase {{inicial}}."}, "_k": "inmuno-q24:1982935766"}, {"id": "inmuno-q25", "tema": "VIH", "examen": "Verdaguer 2021", "anio": 2021, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "En el tratamiento de la infección por VIH (TAR), ¿sobre qué diana **NO** se actúa?", "opciones": {"a": "Transcripción celular del hospedador", "b": "Proteasa", "c": "Integrasa", "d": "Transcriptasa inversa"}, "correcta": "a", "razones": {"a": "CORRECTA (= la que NO se usa). El TAR no inhibe la {{transcripción celular}} normal; eso sería tóxico para la célula.", "b": "Sí: existen inhibidores de la {{proteasa}}.", "c": "Sí: existen inhibidores de la {{integrasa}} (y de entrada/fusión).", "d": "Sí: hay inhibidores de la {{transcriptasa inversa}} (ITIAN/ITINN)."}, "_k": "inmuno-q25:2941218505"}, {"id": "inmuno-q26", "tema": "VIH", "examen": "Recull + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿Cuál es el **índice CD4/CD8** considerado normal?", "opciones": {"a": "0.9", "b": "≈1.5-2.5", "c": "0.5", "d": "5"}, "correcta": "b", "razones": {"a": "0.9 también está {{invertido}} (<1).", "b": "CORRECTA. El cociente {{CD4/CD8}} normal es ≈{{1.5-2.5}} (relación ~2:1).", "c": "Un cociente {{<1}} (invertido) es típico del {{SIDA}}, no de la normalidad.", "d": "5 es demasiado {{alto}}; no es el rango fisiológico."}, "_k": "inmuno-q26:2871510349"}, {"id": "inmuno-q27", "tema": "VIH", "examen": "Verdaguer 2021", "anio": 2021, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿En qué año se produjo la **identificación del VIH**?", "opciones": {"a": "1981", "b": "1996", "c": "1958", "d": "1983"}, "correcta": "d", "razones": {"a": "1981 son los {{primeros casos de SIDA}} descritos (no la identificación del virus).", "b": "1996 es el inicio de la era {{HAART}}, no la identificación.", "c": "{{1958}} es demasiado pronto.", "d": "CORRECTA. El virus se aisló en {{1983}} (Montagnier/Barré-Sinoussi)."}, "_k": "inmuno-q27:475254391"}, {"id": "inmuno-q28", "tema": "Tumoral", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Cuál es un antígeno asociado a tumor (TATA) procedente de **línea germinal** (gónadas masculinas / cáncer-testis)?", "opciones": {"a": "CEA (antígeno carcinoembrionario)", "b": "Tirosinasa", "c": "MAGE-1", "d": "Glicosilación anormal de la mucina (MUC-1)"}, "correcta": "c", "razones": {"a": "CEA es un antígeno {{oncofetal}} (carcinoembrionario), no de línea germinal.", "b": "La tirosinasa es un antígeno de {{diferenciación}} (melanocitos/melanoma).", "c": "CORRECTA. Los antígenos {{cáncer-testis}} ({{MAGE-1}}, NY-ESO-1) se expresan normalmente solo en la {{línea germinal testicular}} y reaparecen en tumores.", "d": "MUC-1 es un antígeno tumoral por {{glicosilación alterada}}, no de línea germinal."}, "_k": "inmuno-q28:2922613574"}, {"id": "inmuno-q29", "tema": "Tumoral", "examen": "2º Parcial 2025 (Bloque A) + Biomed", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida (checkpoints)", "enunciado": "¿Qué molécula actúa **inhibiendo** la acción de los CD8+ citotóxicos e impide su actividad contra las células tumorales?", "opciones": {"a": "B7.1 (CD80)", "b": "NY-ESO-1", "c": "PD-1", "d": "CD28"}, "correcta": "c", "razones": {"a": "B7.1 es ligando {{coestimulador}} (vía CD28).", "b": "{{NY-ESO-1}} es un antígeno tumoral, no un checkpoint inhibidor.", "c": "CORRECTA. {{PD-1}} es un punto de control inhibidor; su ligando {{PD-L1}} en el tumor frena al CD8+ (base de los anti-PD-1/PD-L1).", "d": "CD28 es {{coestimulador}} (activa, no inhibe)."}, "_k": "inmuno-q29:1482664747"}, {"id": "inmuno-q30", "tema": "Tumoral", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "La presencia en el microambiente tumoral de una de estas células **NO** se relaciona con actividad inmunosupresora contra el tumor:", "opciones": {"a": "Linfocitos T CD8+", "b": "CD4+ Tregs", "c": "Macrófagos M2", "d": "MDSCs (mieloides supresoras)"}, "correcta": "a", "razones": {"a": "CORRECTA (= la que NO es inmunosupresora). El {{CD8+}} es el efector {{antitumoral}}, no un supresor.", "b": "Las {{Tregs}} suprimen la respuesta antitumoral.", "c": "Los macrófagos {{M2}} favorecen el tumor (inmunosupresión, angiogénesis).", "d": "Las {{MDSC}} son inmunosupresoras."}, "_k": "inmuno-q30:2134514403"}, {"id": "inmuno-q31", "tema": "Tumoral", "examen": "2º Parcial 2025 (Bloque A) + Biomed", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "La respuesta inmunitaria **celular antitumoral más efectiva** es la:", "opciones": {"a": "Th17", "b": "Th1", "c": "Treg", "d": "Th2"}, "correcta": "b", "razones": {"a": "Th17 se asocia más a {{inflamación crónica}} que a control tumoral efectivo.", "b": "CORRECTA. El perfil {{Th1}} ({{IFN-γ}}, activación de CD8+ y macrófagos M1) es el más eficaz contra los tumores.", "c": "Treg es {{inmunosupresora}} (favorece el escape tumoral).", "d": "Th2 favorece inmunidad {{humoral}}, menos eficaz frente a tumores."}, "_k": "inmuno-q31:1877567266"}, {"id": "inmuno-q32", "tema": "Tumoral", "examen": "Recull + Verdaguer", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Cuál es un **antígeno de trasplante específico de tumor (TSTA)**?", "opciones": {"a": "Alfa-fetoproteína (AFP)", "b": "ERB-2 (HER2/Neu)", "c": "CD10", "d": "Proteína E6"}, "correcta": "d", "razones": {"a": "AFP es un antígeno {{oncofetal}} (asociado, no específico).", "b": "ERB-2/HER2 está {{sobreexpresado}} pero presente en tejido normal (TAA, no específico).", "c": "CD10 es un marcador de {{diferenciación}}, no un TSTA.", "d": "CORRECTA. La proteína {{E6}} (oncoproteína del {{VPH}}) es un antígeno tumoral {{específico}} de origen viral, ausente en tejido sano."}, "_k": "inmuno-q32:3664187681"}, {"id": "inmuno-q33", "tema": "Tumoral", "examen": "Recull + Verdaguer", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "El **trastuzumab** es un anticuerpo monoclonal usado en el cáncer de:", "opciones": {"a": "Mama", "b": "Melanoma", "c": "Colon", "d": "Páncreas"}, "correcta": "a", "razones": {"a": "CORRECTA. El {{trastuzumab}} (Herceptin) es {{anti-HER2/ERB-2}}, usado en cáncer de {{mama}} HER2+.", "b": "El melanoma se trata con {{anti-PD-1}}/anti-CTLA-4, no trastuzumab.", "c": "El colon se trata con anti-EGFR ({{cetuximab}}) o anti-VEGF, no trastuzumab.", "d": "No es la {{indicación clásica}} del trastuzumab."}, "_k": "inmuno-q33:4256148632"}, {"id": "inmuno-q34", "tema": "Tumoral", "examen": "Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿Qué antígeno tumoral es de **origen embrionario/oncofetal**?", "opciones": {"a": "ERB-2", "b": "Alfa-fetoproteína (AFP)", "c": "MAGE-1", "d": "Proteína E6 del VPH"}, "correcta": "b", "razones": {"a": "ERB-2 es de {{sobreexpresión}}, no oncofetal.", "b": "CORRECTA. La {{AFP}} (y el CEA) son antígenos {{oncofetales}}: se expresan en el desarrollo embrionario y reaparecen en tumores.", "c": "MAGE-1 es un antígeno {{cáncer-testis}} (línea germinal), no embrionario.", "d": "E6 es un antígeno {{viral}} (VPH)."}, "_k": "inmuno-q34:2861694162"}, {"id": "inmuno-q35", "tema": "Tumoral", "examen": "Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "", "enunciado": "¿Cuál es una **inmunoterapia antitumoral** efectiva basada en bloqueo de checkpoints?", "opciones": {"a": "Anticuerpos anti-CD80/CD86", "b": "Administración de IL-10", "c": "Anticuerpos agonistas anti-CD40", "d": "Anticuerpos bloqueantes anti-PD-1"}, "correcta": "d", "razones": {"a": "Bloquear CD80/CD86 quitaría {{coestimulación}} (no es la terapia checkpoint efectiva).", "b": "La IL-10 es {{inmunosupresora}}: favorecería el tumor.", "c": "Anti-CD40 agonista es {{inmunoestimulador}} pero no es el bloqueante checkpoint canónico.", "d": "CORRECTA. Los {{anti-PD-1}} (y anti-PD-L1, anti-CTLA-4) liberan el freno del CD8+ → respuesta antitumoral."}, "_k": "inmuno-q35:2485753768"}, {"id": "inmuno-q36", "tema": "Tumoral", "examen": "per-TEMES", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "", "enunciado": "¿Quién realizó la primera inmunoterapia antitumoral con **linfocitos infiltrantes de tumor (TIL)** expandidos y reinfundidos al paciente?", "opciones": {"a": "William Coley", "b": "Paul Ehrlich", "c": "Steven Rosenberg", "d": "Macfarlane Burnet"}, "correcta": "c", "razones": {"a": "{{Coley}} usó toxinas bacterianas ('toxinas de Coley'), no TIL.", "b": "{{Ehrlich}} propuso ideas de vigilancia, no la terapia con TIL.", "c": "CORRECTA. {{Steven Rosenberg}} desarrolló la terapia con {{TIL}} (linfocitos infiltrantes del tumor activados y reintegrados al paciente).", "d": "{{Burnet}} formuló la teoría de la {{vigilancia inmunológica}}, no la terapia celular."}, "_k": "inmuno-q36:1231517948"}, {"id": "inmuno-q37", "tema": "Tumoral", "examen": "Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "En el microambiente tumoral, ¿qué factor **NO dificulta** la respuesta antitumoral?", "opciones": {"a": "Macrófagos M2 abundantes", "b": "Agotamiento metabólico del entorno", "c": "Niveles bajos o ausentes de IDO", "d": "PGE2 elevada"}, "correcta": "c", "razones": {"a": "Los macrófagos {{M2}} sí favorecen el escape tumoral.", "b": "El agotamiento metabólico (hipoxia, déficit de nutrientes) sí {{frena}} a los linfocitos.", "c": "CORRECTA (= no dificulta). La {{IDO}} alta es inmunosupresora (consume triptófano); con IDO {{baja/ausente}} NO se dificulta la respuesta.", "d": "La {{PGE2}} elevada es inmunosupresora."}, "_k": "inmuno-q37:1269529372"}, {"id": "inmuno-q38", "tema": "Trasplante", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "El trasplante de órganos entre dos individuos **genéticamente idénticos** se denomina:", "opciones": {"a": "Autotrasplante", "b": "Isotrasplante", "c": "Alotrasplante", "d": "Xenotrasplante"}, "correcta": "b", "razones": {"a": "El {{autotrasplante}} es del propio individuo.", "b": "CORRECTA. El {{isotrasplante}} (singénico) es entre individuos {{genéticamente idénticos}} (gemelos univitelinos).", "c": "El {{alotrasplante}} es entre individuos de la misma especie genéticamente distintos.", "d": "El {{xenotrasplante}} es entre {{especies}} distintas."}, "_k": "inmuno-q38:467029523"}, {"id": "inmuno-q39", "tema": "Trasplante", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida en varios años", "enunciado": "Un **injerto autólogo** procede de:", "opciones": {"a": "Un individuo de la misma especie", "b": "Un hermano gemelo univitelino", "c": "Un individuo de otra especie", "d": "Del mismo receptor"}, "correcta": "d", "razones": {"a": "Misma especie distinta = {{alogénico}}.", "b": "El gemelo univitelino daría un injerto {{isogénico/singénico}}.", "c": "Otra especie = {{xenogénico}}.", "d": "CORRECTA. El injerto {{autólogo}} (autoinjerto) procede del {{propio paciente}}."}, "_k": "inmuno-q39:1435225713"}, {"id": "inmuno-q40", "tema": "Trasplante", "examen": "Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "Un **xenotrasplante** procede de:", "opciones": {"a": "Un individuo de otra especie", "b": "Un gemelo univitelino", "c": "Del mismo receptor", "d": "Un individuo de la misma especie"}, "correcta": "a", "razones": {"a": "CORRECTA. {{Xeno}} = de {{otra especie}} (p.ej. válvula porcina).", "b": "Gemelo univitelino = {{isogénico}}.", "c": "Del mismo receptor = {{autólogo}}.", "d": "Misma especie = {{alogénico}}."}, "_k": "inmuno-q40:2760760584"}, {"id": "inmuno-q41", "tema": "Trasplante", "examen": "2º Parcial 2025 (Bloque A) + Recull", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Qué es un **injerto ortotópico**?", "opciones": {"a": "Requiere anastomosis vascular obligatoria", "b": "Procede de donante cadáver", "c": "El injerto se sitúa en una localización distinta a la del órgano original", "d": "El injerto se sitúa en la misma localización que el órgano original"}, "correcta": "d", "razones": {"a": "La {{anastomosis vascular}} no es lo que distingue orto de heterotópico.", "b": "El {{origen del donante}} (vivo/cadáver) no define orto/heterotópico.", "c": "Eso define el {{heterotópico}} (distinta localización). ¡Trampa de inversión!", "d": "CORRECTA. {{Ortotópico}} = {{misma localización}} anatómica (p.ej. trasplante hepático en el lecho hepático)."}, "_k": "inmuno-q41:615134869"}, {"id": "inmuno-q42", "tema": "Trasplante", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿Cómo se llama el trasplante en que el injerto se sitúa en una zona del cuerpo **diferente** a la del órgano original?", "opciones": {"a": "Ortotópico", "b": "Singénico", "c": "Heterotópico", "d": "Libre"}, "correcta": "c", "razones": {"a": "Ortotópico = {{misma}} localización.", "b": "{{Singénico}} se refiere a la compatibilidad genética, no a la ubicación.", "c": "CORRECTA. {{Heterotópico}} = localización {{distinta}} a la anatómica (p.ej. riñón en fosa ilíaca).", "d": "Libre = injerto sin {{anastomosis vascular}} (córnea, piel)."}, "_k": "inmuno-q42:893150269"}, {"id": "inmuno-q43", "tema": "Trasplante", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "En los trasplantes, el aloreconocimiento de HLA cuando los linfocitos T del receptor reconocen las APC **del donante** presentes en el injerto se llama:", "opciones": {"a": "Presentación directa", "b": "Presentación semidirecta", "c": "Respuesta a antígenos de histocompatibilidad menores", "d": "Presentación indirecta"}, "correcta": "a", "razones": {"a": "CORRECTA. En la vía {{directa}}, el T del receptor reconoce el {{MHC alogénico intacto}} sobre las APC {{del donante}}.", "b": "La semidirecta implica {{transferencia}} de MHC del donante a APC del receptor.", "c": "Los antígenos {{menores}} son una vía distinta del reconocimiento del MHC.", "d": "En la {{indirecta}}, las APC del {{receptor}} procesan péptidos del donante y los presentan."}, "_k": "inmuno-q43:3375312817"}, {"id": "inmuno-q44", "tema": "Trasplante", "examen": "2º Parcial 2025 + Recull + Biomed", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "Sobre las **leyes del trasplante**, ¿qué afirmación es **FALSA**?", "opciones": {"a": "Los mecanismos de rechazo tienen memoria inmunológica y son específicos", "b": "La intensidad del rechazo NO siempre es proporcional a la disparidad genética", "c": "La región MHC contiene los genes más importantes en la definición del rechazo", "d": "Los injertos se aceptan entre individuos genéticamente idénticos"}, "correcta": "b", "razones": {"a": "Cierta: el rechazo tiene {{memoria}} y es específico (segundo set acelerado).", "b": "FALSA (= respuesta). La intensidad del rechazo {{SÍ es proporcional}} a la disparidad genética/HLA: a mayor diferencia, mayor rechazo.", "c": "Cierta: el {{MHC}} alberga los genes más relevantes del rechazo.", "d": "Cierta: entre genéticamente idénticos ({{singénicos}}) no hay rechazo."}, "_k": "inmuno-q44:2929516504"}, {"id": "inmuno-q45", "tema": "Trasplante", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "El **cross-match** previo al trasplante previene el rechazo:", "opciones": {"a": "Hiperagudo", "b": "Acelerado", "c": "Agudo", "d": "Crónico"}, "correcta": "a", "razones": {"a": "CORRECTA. El cross-match detecta {{anticuerpos preformados}} del receptor contra el donante → previene el rechazo {{hiperagudo}} (minutos-horas, 'infarto blanco').", "b": "El acelerado (días) es por {{memoria celular}}, no se previene con cross-match.", "c": "El agudo es mediado por {{T}} (semanas), responde a inmunosupresión.", "d": "El crónico (meses-años) es {{fibrosis/vasculopatía}}, no por Acs preformados."}, "_k": "inmuno-q45:2962960799"}, {"id": "inmuno-q46", "tema": "Trasplante", "examen": "Recull + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Cuál de los siguientes **NO es un injerto/trasplante libre** (avascular)?", "opciones": {"a": "Piel", "b": "Hueso", "c": "Córnea", "d": "Riñón"}, "correcta": "d", "razones": {"a": "La {{piel}} es injerto libre (no requiere anastomosis vascular).", "b": "El {{hueso}} es injerto libre.", "c": "La {{córnea}} es un injerto libre (avascular).", "d": "CORRECTA (= no libre). El {{riñón}} (y el hígado) requieren {{anastomosis vascular}} → NO son libres."}, "_k": "inmuno-q46:1214069335"}, {"id": "inmuno-q47", "tema": "Trasplante", "examen": "Recull (Bloque B)", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "Un rechazo de trasplante que aparece a los **~25-51 días** y **responde** a terapia inmunosupresora es el rechazo:", "opciones": {"a": "Crónico", "b": "Acelerado", "c": "Agudo", "d": "Hiperagudo"}, "correcta": "c", "razones": {"a": "El {{crónico}} (meses-años) {{NO}} responde a inmunosupresión (fibrosis).", "b": "El {{acelerado}} es en pocos días (memoria), peor pronóstico.", "c": "CORRECTA. El rechazo {{agudo}} (días-semanas) es mediado por {{linfocitos T}} y {{responde}} a inmunosupresión.", "d": "El {{hiperagudo}} es en minutos-horas (Acs preformados)."}, "_k": "inmuno-q47:3911757944"}, {"id": "inmuno-q48", "tema": "Trasplante", "examen": "Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "En un trasplante, reconocer el HLA intacto en las células dendríticas **del órgano donante** corresponde a la presentación:", "opciones": {"a": "Cruzada", "b": "Directa", "c": "Indirecta", "d": "Semidirecta"}, "correcta": "b", "razones": {"a": "Cruzada (cross-presentation) es otro fenómeno (Ag exógeno en {{MHC-I}}).", "b": "CORRECTA. Reconocer el MHC intacto sobre las DC {{del donante}} = vía {{directa}}.", "c": "Indirecta = APC del {{receptor}} presenta péptidos del donante. (La trampa pone esto como 'indirecta'.)", "d": "Semidirecta = transferencia de {{MHC donante}} a APC receptor."}, "_k": "inmuno-q48:2883964023"}, {"id": "inmuno-q49", "tema": "Autoinmunidad", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿Quién propuso en 1900 el término **'Horror autotoxicus'**?", "opciones": {"a": "Ray Owen", "b": "Paul Ehrlich", "c": "Peter Medawar", "d": "Frank Macfarlane Burnet"}, "correcta": "b", "razones": {"a": "Owen describió el {{quimerismo}} en gemelos bovinos.", "b": "CORRECTA. {{Paul Ehrlich}} acuñó 'horror autotoxicus' (aversión natural a la autolesión = base conceptual de la autoinmunidad).", "c": "Medawar estudió la {{tolerancia}} y el rechazo de injertos.", "d": "Burnet formuló la teoría de la {{selección clonal}} y la vigilancia."}, "_k": "inmuno-q49:3011635708"}, {"id": "inmuno-q50", "tema": "Autoinmunidad", "examen": "2º Parcial 2025 + Recull + Verdaguer", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Qué enfermedad es debida a mutación del gen **AIRE**?", "opciones": {"a": "Pénfigo vulgar", "b": "Síndrome IPEX", "c": "Síndrome de Goodpasture", "d": "Síndrome APECED (APS-1)"}, "correcta": "d", "razones": {"a": "El pénfigo vulgar es por Acs anti-{{desmogleína}} (no genético AIRE).", "b": "El {{IPEX}} es por mutación de {{FoxP3}} (Treg), no AIRE.", "c": "Goodpasture es por Acs anti-{{membrana basal}} (colágeno IV).", "d": "CORRECTA. {{AIRE}} controla la expresión de autoantígenos periféricos en el timo (mTEC); su mutación causa {{APECED}} (= APS-1) por fallo de la {{tolerancia central}}."}, "_k": "inmuno-q50:2518824607"}, {"id": "inmuno-q51", "tema": "Autoinmunidad", "examen": "2º Parcial 2025 (Bloque A) + Verdaguer 2021", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en 2021", "enunciado": "El síndrome **IPEX** (enteropatía, endocrinopatía y diabetes mellitus neonatal ligada al cromosoma X) es debido a mutación de:", "opciones": {"a": "FoxP3", "b": "LYST", "c": "STAT3", "d": "AIRE"}, "correcta": "a", "razones": {"a": "CORRECTA. {{IPEX}} = mutación de {{FoxP3}} (ligado a X) → fallo de las {{Tregs}} → autoinmunidad multiorgánica.", "b": "LYST → {{Chediak-Higashi}}.", "c": "STAT3 → síndrome de {{Job/Hiper-IgE}}.", "d": "AIRE → {{APECED}}."}, "_k": "inmuno-q51:3781366346"}, {"id": "inmuno-q52", "tema": "Autoinmunidad", "examen": "2º Parcial 2025 (Bloque A) + Recull", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "Según Gell y Coombs, en el **LES (lupus eritematoso sistémico)** se produce una hipersensibilidad de tipo:", "opciones": {"a": "Tipo II", "b": "Tipo IV", "c": "Tipo III", "d": "Tipo I"}, "correcta": "c", "razones": {"a": "El tipo II es {{citotoxicidad}} por Acs contra antígeno fijo en célula.", "b": "El tipo IV es {{celular}} (retardada).", "c": "CORRECTA. El LES es el prototipo de HS {{tipo III}}: depósito de {{inmunocomplejos}} circulantes → activación del complemento → vasculitis y glomerulonefritis.", "d": "El tipo I es alergia ({{IgE}}-mastocito)."}, "_k": "inmuno-q52:2985286380"}, {"id": "inmuno-q53", "tema": "Autoinmunidad", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Cuál de estas enfermedades autoinmunes cursa con **formación de inmunocomplejos** (HS III)?", "opciones": {"a": "Diabetes tipo 1", "b": "Lupus eritematoso sistémico (LES)", "c": "Enfermedad de Graves", "d": "Miastenia gravis"}, "correcta": "b", "razones": {"a": "DM1 = destrucción de células β por CD8+ (HS {{IV}}).", "b": "CORRECTA. El {{LES}} = inmunocomplejos (HS {{III}}).", "c": "Graves = Acs anti-receptor TSH (HS {{II}} estimulante).", "d": "Miastenia = Acs anti-receptor ACh (HS {{II}})."}, "_k": "inmuno-q53:1256810584"}, {"id": "inmuno-q54", "tema": "Autoinmunidad", "examen": "2º Parcial 2025 + Recull + Verdaguer + Biomed", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿En qué enfermedad se producen autoanticuerpos contra los **receptores de acetilcolina** de la placa motora?", "opciones": {"a": "Enfermedad de Graves", "b": "Tiroiditis de Hashimoto", "c": "Miastenia gravis", "d": "Esclerosis múltiple"}, "correcta": "c", "razones": {"a": "Graves = Acs {{anti-receptor de TSH}} (estimulante).", "b": "Hashimoto = Acs {{anti-tiroglobulina/TPO}} (hipotiroidismo).", "c": "CORRECTA. La {{miastenia gravis}} cursa con Acs {{anti-receptor de ACh}} (HS II bloqueante) → debilidad muscular.", "d": "La EM es desmielinizante mediada por {{células T}} (HS IV)."}, "_k": "inmuno-q54:4106595844"}, {"id": "inmuno-q55", "tema": "Autoinmunidad", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "Según Gell y Coombs, en el **síndrome de Goodpasture** se produce hipersensibilidad de tipo:", "opciones": {"a": "Tipo II", "b": "Tipo IV", "c": "Tipo III", "d": "Tipo I"}, "correcta": "a", "razones": {"a": "CORRECTA. Goodpasture = Acs {{anti-membrana basal}} (colágeno IV) glomerular y alveolar = HS {{II}} citotóxica.", "b": "El tipo IV es {{celular}} (retardada).", "c": "El tipo III es por {{inmunocomplejos}} (LES).", "d": "El tipo I es {{alergia}} (IgE)."}, "_k": "inmuno-q55:3823977606"}, {"id": "inmuno-q56", "tema": "Autoinmunidad", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida en varios años", "enunciado": "¿En qué enfermedad se produce una respuesta autoinmune contra el **factor intrínseco**?", "opciones": {"a": "Diabetes tipo 1", "b": "LES", "c": "Enfermedad de Graves", "d": "Anemia perniciosa"}, "correcta": "d", "razones": {"a": "DM1 = destrucción de {{células β}} por T.", "b": "LES = {{inmunocomplejos}}.", "c": "Graves = {{anti-receptor TSH}}.", "d": "CORRECTA. La {{anemia perniciosa}} cursa con Acs anti-{{factor intrínseco}} y anti-células parietales → malabsorción de {{vitamina B12}} (HS II)."}, "_k": "inmuno-q56:2657834336"}, {"id": "inmuno-q57", "tema": "Autoinmunidad", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿En qué enfermedad se produce fundamentalmente **hipersensibilidad tipo II**?", "opciones": {"a": "Enfermedad de Graves", "b": "Esclerosis múltiple", "c": "LES", "d": "Panarteritis nodosa"}, "correcta": "a", "razones": {"a": "CORRECTA. La {{enfermedad de Graves}} = Acs anti-receptor de {{TSH}} (HS II, variante estimulante).", "b": "Esclerosis múltiple = HS {{IV}} (celular).", "c": "LES = HS {{III}} (inmunocomplejos).", "d": "Panarteritis nodosa = HS {{III}}."}, "_k": "inmuno-q57:779697325"}, {"id": "inmuno-q58", "tema": "Autoinmunidad", "examen": "Recull + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida en varios años", "enunciado": "¿Qué enfermedad se caracteriza por una respuesta **citotóxica de linfocitos T** contra las células diana que expresan el autoantígeno (HS IV)?", "opciones": {"a": "Miastenia gravis", "b": "LES", "c": "Diabetes mellitus tipo 1", "d": "Enfermedad de Graves"}, "correcta": "c", "razones": {"a": "Miastenia = {{HS II}} (Acs).", "b": "LES = HS III ({{inmunocomplejos}}).", "c": "CORRECTA. La {{DM1}} se debe a destrucción de las {{células β}} pancreáticas por {{CD8+}} citotóxicos (HS IV / autoinmunidad celular).", "d": "Graves = HS II (Acs {{anti-TSH-R}})."}, "_k": "inmuno-q58:884796230"}, {"id": "inmuno-q59", "tema": "Autoinmunidad", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida en varios años", "enunciado": "¿Cuál es la explicación del cuadro de **confusión mental** de algunos pacientes con **Lupus** (neurolupus)?", "opciones": {"a": "Falta de glucosa", "b": "Tratamiento inmunosupresor", "c": "Anticuerpos anti-DNA directos sobre neuronas", "d": "Vasculitis de vaso pequeño"}, "correcta": "d", "razones": {"a": "La {{hipoglucemia}} no es el mecanismo del neurolupus.", "b": "El {{tratamiento}} no es la causa del cuadro confusional.", "c": "Los anti-DNA son {{marcadores}}; el daño cerebral es por vasculitis, no acción directa.", "d": "CORRECTA. La afectación neuropsiquiátrica del LES se explica por {{vasculitis de pequeño vaso}} (depósito de inmunocomplejos en el SNC)."}, "_k": "inmuno-q59:3586926573"}, {"id": "inmuno-q60", "tema": "Autoinmunidad", "examen": "Verdaguer 2021", "anio": 2021, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿Qué fármaco **NO** se ha relacionado con **lupus inducido por fármacos**?", "opciones": {"a": "Procainamida", "b": "Penicilina", "c": "Isoniazida", "d": "Hidralazina"}, "correcta": "b", "razones": {"a": "La {{procainamida}} es uno de los inductores más típicos.", "b": "CORRECTA (= no se relaciona). La {{penicilina}} no figura entre los inductores clásicos de lupus farmacológico.", "c": "La {{isoniazida}} también induce lupus farmacológico.", "d": "La {{hidralazina}} es inductor clásico."}, "_k": "inmuno-q60:2339181281"}, {"id": "inmuno-q61", "tema": "Autoinmunidad", "examen": "Recull + Verdaguer", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿Cuál de los siguientes **NO es un mecanismo de tolerancia central** de los linfocitos B y/o T?", "opciones": {"a": "Edición del receptor (receptor editing)", "b": "Muerte por negligencia", "c": "Generación de células T reguladoras (Tregs inducidas)", "d": "Selección negativa"}, "correcta": "c", "razones": {"a": "La {{edición del receptor}} (B) es central. ¡Ojo, no confundir con 'revisión periférica'!", "b": "La {{muerte por negligencia}} (falta de selección positiva) es central.", "c": "CORRECTA (= no central). La generación de {{Tregs inducidas}} (periféricas) y la anergia son mecanismos de tolerancia {{periférica}}, no central.", "d": "La selección {{negativa}} (deleción clonal en timo/médula) es central."}, "_k": "inmuno-q61:2468854473"}, {"id": "inmuno-q62", "tema": "Autoinmunidad", "examen": "Recull + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "Sobre los **mecanismos de tolerancia**, ¿qué afirmación es **CIERTA**?", "opciones": {"a": "Solo una minoría de timocitos llega al estadio de linfocito T (<5%)", "b": "Las Tregs producen IL-1 y TNF-α", "c": "CTLA-4 actúa durante la deleción central de T autorreactivos", "d": "Tolerancia es sinónimo de supresión inmunológica"}, "correcta": "a", "razones": {"a": "CORRECTA. Solo ~{{2-5%}} de los timocitos sobreviven a la selección tímica (positiva + negativa).", "b": "Falsa: las Tregs producen {{IL-10 y TGF-β}}, no IL-1/TNF.", "c": "Falsa: {{CTLA-4}} es un mecanismo {{periférico}}, no de deleción central.", "d": "Falsa: tolerancia ≠ {{inmunosupresión}} generalizada (es específica de antígeno)."}, "_k": "inmuno-q62:3458668949"}, {"id": "inmuno-q63", "tema": "Autoinmunidad", "examen": "Recull + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "Los **procesos de autoinmunidad**:", "opciones": {"a": "Siempre se asocian a anticuerpos anti-DNA", "b": "Siempre son órgano-específicos", "c": "Se deben a ausencia de selección positiva en el timo", "d": "Se explican por deficiencias en la inducción de tolerancia central y/o periférica"}, "correcta": "d", "razones": {"a": "Falsa: solo el {{LES}} y similares; no todas tienen anti-DNA.", "b": "Falsa: pueden ser {{sistémicas}} (LES) u órgano-específicas.", "c": "Falsa: el fallo es de la selección {{negativa}}, no de la positiva.", "d": "CORRECTA. La autoinmunidad surge por {{fallo de la tolerancia}} central y/o periférica."}, "_k": "inmuno-q63:3840229032"}, {"id": "inmuno-q64", "tema": "Autoinmunidad", "examen": "per-TEMES", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿Cuál **NO** es una causa de autoinmunidad?", "opciones": {"a": "Fallo de la educación tímica", "b": "Mimetismo celular", "c": "Rotura de la tolerancia periférica", "d": "Activación linfocitaria inespecífica"}, "correcta": "b", "razones": {"a": "El fallo de la {{educación tímica}} sí causa autoinmunidad.", "b": "CORRECTA (= no es causa). El mecanismo real es el {{mimetismo molecular}} (homología antígeno microbiano-propio), no 'celular'.", "c": "La rotura de la tolerancia {{periférica}} sí es causa.", "d": "La activación inespecífica (p.ej. por {{superantígenos}}) sí puede desencadenarla."}, "_k": "inmuno-q64:4123531434"}, {"id": "inmuno-q65", "tema": "Autoinmunidad", "examen": "Verdaguer 2021", "anio": 2021, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "El **ejercicio físico** puede inducir la activación de:", "opciones": {"a": "Neutrófilos", "b": "Mastocitos", "c": "Células NK", "d": "Monocitos"}, "correcta": "b", "razones": {"a": "Los {{neutrófilos}} no median la reacción inmediata por ejercicio.", "b": "CORRECTA. La anafilaxia inducida por ejercicio cursa con degranulación de {{mastocitos}}.", "c": "Las {{NK}} no son la diana del estímulo físico en este contexto.", "d": "Los {{monocitos}} no son el efector de la anafilaxia por ejercicio."}, "_k": "inmuno-q65:2639246112"}, {"id": "inmuno-q66", "tema": "Alergia/Hipersensibilidad", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Concepto repetido (Gell-Coombs IV)", "enunciado": "Según la clasificación de Gell y Coombs, ¿en qué tipo de hipersensibilidad se activan los **linfocitos T CD8+**?", "opciones": {"a": "Tipo IVa", "b": "Tipo IVb", "c": "Tipo IVd", "d": "Tipo IVc"}, "correcta": "d", "razones": {"a": "La {{IVa}} es Th1/macrófagos (granuloma).", "b": "La {{IVb}} es Th2/eosinófilos.", "c": "La {{IVd}} es neutrofílica (IL-8).", "d": "CORRECTA. En la subclasificación de la HS IV, la {{IVc}} está mediada por {{CD8+ citotóxicos}} (p.ej. exantemas ampollosos, dermatitis de contacto severa)."}, "_k": "inmuno-q66:1281573460"}, {"id": "inmuno-q67", "tema": "Alergia/Hipersensibilidad", "examen": "Verdaguer 2021", "anio": 2021, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "Una biopsia muestra **granulomas formados por macrófagos rodeados de linfocitos T CD4+**. Según Gell y Coombs, ¿qué tipo de hipersensibilidad es?", "opciones": {"a": "Tipo IVc", "b": "Tipo IVb", "c": "Tipo IVa", "d": "Tipo IVd"}, "correcta": "c", "razones": {"a": "IVc = {{CD8+}} citotóxico.", "b": "IVb = {{Th2}}/eosinófilos.", "c": "CORRECTA. El patrón {{granuloma + macrófagos + CD4+}} = respuesta {{Th1}} → activación de macrófagos = HS {{IVa}} (clásico de tuberculosis).", "d": "IVd = {{neutrofílica}} (IL-8)."}, "_k": "inmuno-q67:3792815844"}, {"id": "inmuno-q68", "tema": "Alergia/Hipersensibilidad", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "Según Gell y Coombs, las **respuestas alérgicas** son de tipo:", "opciones": {"a": "Tipo I", "b": "Tipo III", "c": "Tipo IV", "d": "Tipo II"}, "correcta": "a", "razones": {"a": "CORRECTA. La alergia es HS {{tipo I}}: mediada por {{IgE}} unida a {{mastocitos}}.", "b": "El tipo III es por {{inmunocomplejos}}.", "c": "El tipo IV es {{celular}} (retardada).", "d": "El tipo II es {{citotóxico}} (Acs sobre célula)."}, "_k": "inmuno-q68:2338801832"}, {"id": "inmuno-q69", "tema": "Alergia/Hipersensibilidad", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "Según Gell y Coombs, la hipersensibilidad **mediada por anticuerpos** es de tipo:", "opciones": {"a": "Tipo III", "b": "Tipo II", "c": "Tipo IV", "d": "Tipo I"}, "correcta": "b", "razones": {"a": "El tipo III es por {{inmunocomplejos}} solubles.", "b": "CORRECTA. El {{tipo II}} es citotóxico, mediado por {{anticuerpos (IgG/IgM)}} contra antígenos {{fijos}} de superficie celular.", "c": "El tipo IV es {{celular}} (T).", "d": "El tipo I es {{IgE}} (alergia)."}, "_k": "inmuno-q69:2596213924"}, {"id": "inmuno-q70", "tema": "Alergia/Hipersensibilidad", "examen": "Recull + Verdaguer", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "Según Gell y Coombs, la hipersensibilidad **mediada por inmunocomplejos** es de tipo:", "opciones": {"a": "Tipo II", "b": "Tipo I", "c": "Tipo IV", "d": "Tipo III"}, "correcta": "d", "razones": {"a": "El tipo II es Acs sobre {{antígeno fijo}}.", "b": "El tipo I es {{IgE}}.", "c": "El tipo IV es {{celular}}.", "d": "CORRECTA. El {{tipo III}} es por depósito de {{inmunocomplejos}} (Ag-Ac solubles) → complemento → vasculitis (LES, enfermedad del suero)."}, "_k": "inmuno-q70:911215181"}, {"id": "inmuno-q71", "tema": "Alergia/Hipersensibilidad", "examen": "Recull + Verdaguer", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "Según Gell y Coombs, la hipersensibilidad **celular** (retardada) es de tipo:", "opciones": {"a": "Tipo IV", "b": "Tipo II", "c": "Tipo I", "d": "Tipo III"}, "correcta": "a", "razones": {"a": "CORRECTA. El {{tipo IV}} es la hipersensibilidad {{celular}} (mediada por linfocitos T, retardada 48-72h).", "b": "El tipo II es por Acs {{citotóxicos}}.", "c": "El tipo I es humoral {{inmediata}} (IgE).", "d": "El tipo III es por {{inmunocomplejos}}."}, "_k": "inmuno-q71:3570333208"}, {"id": "inmuno-q72", "tema": "Alergia/Hipersensibilidad", "examen": "2º Parcial 2025 (Bloque B) + Recull", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "Cuando hablamos de **enfermedad del suero**, nos referimos a una hipersensibilidad de tipo:", "opciones": {"a": "Tipo IV", "b": "Tipo I", "c": "Tipo III", "d": "Tipo II"}, "correcta": "c", "razones": {"a": "El tipo IV es {{celular}}.", "b": "El tipo I es alergia ({{IgE}}).", "c": "CORRECTA. La enfermedad del suero = {{inmunocomplejos}} circulantes (HS {{III}}).", "d": "El tipo II es {{citotóxico}}."}, "_k": "inmuno-q72:3811708147"}, {"id": "inmuno-q73", "tema": "Alergia/Hipersensibilidad", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida (fases de la alergia)", "enunciado": "Las manifestaciones clínicas de la **fase inicial** (primeros 5-30 min) de un episodio alérgico se deben principalmente a:", "opciones": {"a": "Leucotrienos C4/D4/E4", "b": "Triptasa", "c": "Citocinas Th2 (IL-3, IL-5)", "d": "Histamina"}, "correcta": "d", "razones": {"a": "Los leucotrienos se sintetizan de novo y dominan la fase {{tardía}}.", "b": "La {{triptasa}} es marcador de degranulación pero no el responsable principal del cuadro inicial.", "c": "Las citocinas Th2 reclutan células en la fase {{tardía}} (horas).", "d": "CORRECTA. La {{histamina}} es un mediador {{preformado}} liberado en segundos-minutos (fase inmediata): vasodilatación, edema, broncoconstricción."}, "_k": "inmuno-q73:1745310565"}, {"id": "inmuno-q74", "tema": "Alergia/Hipersensibilidad", "examen": "Biomed + Recull", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida (fase inmediata)", "enunciado": "¿Cuál es el producto **máximo responsable de la reacción alérgica inmediata** (primeros 20 minutos)?", "opciones": {"a": "Prostaglandina D2", "b": "Histamina", "c": "Leucotrienos", "d": "Citocinas Th2"}, "correcta": "b", "razones": {"a": "La PGD2 se sintetiza {{de novo}} (no preformada).", "b": "CORRECTA. La {{histamina}} (preformada en gránulos) es la principal de la fase inmediata.", "c": "Los leucotrienos se sintetizan {{de novo}} (fase tardía).", "d": "Las citocinas Th2 actúan en la fase {{tardía}}."}, "_k": "inmuno-q74:519552081"}, {"id": "inmuno-q75", "tema": "Alergia/Hipersensibilidad", "examen": "Verdaguer 2021 + per-TEMES", "anio": 2021, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿Qué mediador está **preformado** y almacenado en los gránulos de los mastocitos?", "opciones": {"a": "Leucotrieno C4", "b": "Prostaglandina D2", "c": "Histamina", "d": "PAF (factor activador de plaquetas)"}, "correcta": "c", "razones": {"a": "Los leucotrienos se sintetizan {{de novo}} desde el ácido araquidónico.", "b": "La {{PGD2}} se sintetiza {{de novo}} (no preformada).", "c": "CORRECTA. La {{histamina}} es {{preformada}} y se libera al degranular.", "d": "El PAF también se sintetiza {{de novo}}."}, "_k": "inmuno-q75:1306032905"}, {"id": "inmuno-q76", "tema": "Alergia/Hipersensibilidad", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "En relación a la **alergia**, ¿qué afirmación es **FALSA**?", "opciones": {"a": "La respuesta inmediata se caracteriza por acumulación de leucocitos inflamatorios y linfocitos CD4+ Th2 en el lugar de la reacción", "b": "Es una reacción de HS tipo I a un alérgeno normalmente inocuo", "c": "Los mastocitos juegan un papel clave", "d": "En el primer contacto nunca se produce respuesta alérgica"}, "correcta": "a", "razones": {"a": "FALSA (= respuesta). La acumulación de leucocitos y Th2 es la {{fase tardía}}, NO la inmediata (que es histamina/vasodilatación/edema).", "b": "Cierta: la alergia es HS {{tipo I}} frente a alérgenos inocuos.", "c": "Cierta: los {{mastocitos}} son la célula clave (IgE-FcεRI).", "d": "Cierta: el primer contacto solo {{sensibiliza}}; nunca da respuesta."}, "_k": "inmuno-q76:1501272017"}, {"id": "inmuno-q77", "tema": "Alergia/Hipersensibilidad", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "En relación a las **alergias**, ¿qué afirmación es **FALSA**?", "opciones": {"a": "Nunca se da la primera vez que el paciente contacta con el alérgeno", "b": "Está producida por IgE", "c": "Se puede desencadenar por anafilotoxinas (C3a y C5a)", "d": "La peor respuesta es la anafilaxia sistémica"}, "correcta": "c", "razones": {"a": "Cierta: nunca en el {{primer contacto}} (solo sensibiliza).", "b": "Cierta: la alergia tipo I está mediada por {{IgE}}.", "c": "FALSA (= respuesta). La activación por {{anafilotoxinas C3a/C5a}} es un mecanismo {{anafilactoide}} (no IgE-dependiente), no alergia tipo I propiamente.", "d": "Cierta: la {{anafilaxia sistémica}} es la peor manifestación."}, "_k": "inmuno-q77:2907881744"}, {"id": "inmuno-q78", "tema": "Alergia/Hipersensibilidad", "examen": "2º Parcial 2025 (Bloque A)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "En relación a la alergia, ¿qué afirmación es **FALSA**?", "opciones": {"a": "La función primordial de las enzimas de los gránulos de los mastocitos es degradar estructuras microbianas", "b": "Existe una predisposición genética", "c": "Un tratamiento de la alergia grave es el anticuerpo anti-IgE (omalizumab)", "d": "La peor respuesta alérgica posible es la anafilaxia sistémica"}, "correcta": "a", "razones": {"a": "FALSA (= respuesta). En el contexto {{alérgico}} los mastocitos se activan por entrecruzamiento de {{IgE-FcεRI}}; afirmar que su función primordial es 'degradar microbios' está fuera de contexto.", "b": "Cierta: existe predisposición {{atópica}} genética.", "c": "Cierta: el {{omalizumab}} (anti-IgE) se usa en alergia/asma grave.", "d": "Cierta: la {{anafilaxia sistémica}} es la peor respuesta."}, "_k": "inmuno-q78:781019055"}, {"id": "inmuno-q79", "tema": "Alergia/Hipersensibilidad", "examen": "2º Parcial 2025 (Bloque B) + Recull", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida en varios años", "enunciado": "El shock desencadenado por la entrada de un **alérgeno** con liberación masiva de gránulos y síntesis de nuevos mediadores de los mastocitos es el:", "opciones": {"a": "Shock anafilactoide", "b": "Shock anafiláctico", "c": "Shock séptico", "d": "Síndrome del shock tóxico"}, "correcta": "b", "razones": {"a": "El anafilactoide es activación mastocitaria {{NO mediada por IgE}} (clínica similar).", "b": "CORRECTA. El {{shock anafiláctico}} está mediado por {{IgE-mastocito}} (alérgeno).", "c": "El séptico es por {{infección/endotoxina}}.", "d": "El tóxico es por {{superantígeno}}."}, "_k": "inmuno-q79:639962065"}, {"id": "inmuno-q80", "tema": "Alergia/Hipersensibilidad", "examen": "Recull + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida en varios años", "enunciado": "¿Qué patología **NO** tiene origen en una reacción mediada por **IgE**?", "opciones": {"a": "Asma bronquial", "b": "Shock anafiláctico", "c": "Rinitis alérgica", "d": "Síndrome del shock tóxico"}, "correcta": "d", "razones": {"a": "El asma bronquial alérgica es {{HS I}} (IgE).", "b": "El shock anafiláctico SÍ es por {{IgE}}/mastocitos.", "c": "La rinitis alérgica es {{HS I}} (IgE).", "d": "CORRECTA (= no es por IgE). El {{síndrome del shock tóxico}} es por {{superantígeno}} (TSST-1), no IgE."}, "_k": "inmuno-q80:1906885390"}, {"id": "inmuno-q81", "tema": "Alergia/Hipersensibilidad", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "En sospecha de **dermatitis por hipersensibilidad retardada** (de contacto), ¿qué prueba es decisiva?", "opciones": {"a": "Prick test", "b": "IgE específicas en suero", "c": "Prueba epicutánea (patch test)", "d": "Incremento de IgE sérica total"}, "correcta": "c", "razones": {"a": "El {{prick test}} es para HS {{I}} (lectura ~20 min).", "b": "Las IgE específicas valoran {{HS I}}, no la dermatitis de contacto.", "c": "CORRECTA. La dermatitis de contacto es HS {{IV}} → {{prueba epicutánea}} (parche), lectura a {{48-72h}}.", "d": "La IgE total es de la {{HS I}}, no de la HS IV."}, "_k": "inmuno-q81:3503704812"}, {"id": "inmuno-q82", "tema": "Alergia/Hipersensibilidad", "examen": "2º Parcial 2025 (Bloque B)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "¿Qué prueba **in vivo** es más adecuada para diagnosticar una **dermatitis de contacto**?", "opciones": {"a": "Prick test", "b": "Prueba epicutánea (patch test)", "c": "Mantoux", "d": "Biopsia de la piel"}, "correcta": "b", "razones": {"a": "El {{prick}} es para HS I (lectura inmediata).", "b": "CORRECTA. La dermatitis de contacto es HS IV → {{prueba epicutánea/parche}}.", "c": "El Mantoux explora HS IV frente a {{tuberculina}}, no contacto.", "d": "La biopsia es {{complementaria}}, no la prueba in vivo de elección."}, "_k": "inmuno-q82:732017942"}, {"id": "inmuno-q83", "tema": "Alergia/Hipersensibilidad", "examen": "Recull + Verdaguer", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida en varios años", "enunciado": "Tras un **shock anafiláctico**, ¿en qué momento realizarías el **prick test** para conocer el alérgeno?", "opciones": {"a": "A las 72 horas", "b": "Nunca", "c": "A las 12 horas", "d": "A los 15 días"}, "correcta": "d", "razones": {"a": "Aún {{demasiado pronto}}.", "b": "Falsa: sí se puede hacer, esperando la {{recuperación}}.", "c": "Demasiado pronto ({{período refractario}}).", "d": "CORRECTA. Hay que esperar ~{{15 días}} (2-4 semanas): tras la anafilaxia hay {{depleción de mediadores}} mastocitarios → falsos negativos si se hace antes."}, "_k": "inmuno-q83:471422909"}, {"id": "inmuno-q84", "tema": "Alergia/Hipersensibilidad", "examen": "2º Parcial 2025 (Bloque B)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "En el estudio histológico de la pápula a los 20 minutos de un **Prick Test**, ¿qué esperarías encontrar?", "opciones": {"a": "Vasodilatación y edema del tejido", "b": "Infiltrado de células plasmáticas productoras de IgE", "c": "Infiltrado de neutrófilos, eosinófilos y CD4+", "d": "Infiltrado de mastocitos y eosinófilos"}, "correcta": "a", "razones": {"a": "CORRECTA. A los 20 min domina la {{fase inmediata}} (histamina): {{vasodilatación y edema}} (roncha y eritema).", "b": "Las {{plasmáticas}} productoras de IgE no infiltran la pápula inmediata.", "c": "El infiltrado celular es de la fase {{tardía}} (4-8h).", "d": "El infiltrado celular no es lo predominante a los {{20 min}}."}, "_k": "inmuno-q84:2507548167"}, {"id": "inmuno-q85", "tema": "Alergia/Hipersensibilidad", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "Repetida en varios años", "enunciado": "¿Qué parámetros hacen pensar en una respuesta de **tipo III** (Gell y Coombs)?", "opciones": {"a": "C3 alto y presencia de IgE específica", "b": "Nivel de C3 bajo y ausencia de IgE específica", "c": "Prick test positivo", "d": "Test de Coombs indirecto positivo"}, "correcta": "b", "razones": {"a": "{{C3 alto}} + IgE específica no corresponde al tipo III.", "b": "CORRECTA. El tipo III consume complemento → {{C3 bajo}}, y no hay {{IgE específica}} (eso sería tipo I). Hay hematuria/proteinuria y depósitos de Ig.", "c": "El prick positivo es de la {{HS I}} (alergia).", "d": "El Coombs indirecto detecta IgG sobre antígeno (más propio del {{tipo II}})."}, "_k": "inmuno-q85:2738032659"}, {"id": "inmuno-q86", "tema": "Alergia/Hipersensibilidad", "examen": "2º Parcial 2025 (Bloque B) + Recull", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "¿Qué resultado de una prueba de **Coombs** tiene **peor pronóstico**?", "opciones": {"a": "1/8", "b": "1/16", "c": "1/64", "d": "1/128"}, "correcta": "d", "razones": {"a": "1/8 es un título {{bajo}} (mejor pronóstico).", "b": "1/16 es {{bajo}}.", "c": "1/64 es {{menor}} que 1/128.", "d": "CORRECTA. A mayor {{título}} (más diluciones positivas) = más anticuerpo = {{peor pronóstico}}. 1/128 es el más alto."}, "_k": "inmuno-q86:3864210883"}, {"id": "inmuno-q87", "tema": "Alergia/Hipersensibilidad", "examen": "2º Parcial 2025 (Bloque B) + Recull", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "En la **anemia hemolítica autoinmune** tras infección por **Mycoplasma pneumoniae**, ¿contra qué antígeno eritrocitario se forman los anticuerpos?", "opciones": {"a": "Antígeno Ro", "b": "Antígeno A", "c": "Antígeno I", "d": "Antígeno Rh"}, "correcta": "c", "razones": {"a": "{{Ro}}/La son antígenos del LES/Sjögren, no eritrocitarios.", "b": "El antígeno A es del sistema {{ABO}} (transfusión).", "c": "CORRECTA. Mycoplasma induce {{crioaglutininas}} (IgM) anti-{{antígeno I}} de los eritrocitos → anemia hemolítica.", "d": "El {{Rh}} es la diana en la enfermedad hemolítica del recién nacido, no en Mycoplasma."}, "_k": "inmuno-q87:3724048097"}, {"id": "inmuno-q88", "tema": "Alergia/Hipersensibilidad", "examen": "Recull + Verdaguer", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida en varios años", "enunciado": "Una anemia hemolítica autoinmune tras infección por **Mycoplasma**, según Gell y Coombs, ¿de qué tipo es?", "opciones": {"a": "Tipo II", "b": "Tipo III", "c": "Tipo IV", "d": "Tipo I"}, "correcta": "a", "razones": {"a": "CORRECTA. La anemia hemolítica autoinmune = HS {{tipo II}} (Acs contra antígenos del eritrocito → opsonización/fagocitosis + complemento).", "b": "El tipo III es por {{inmunocomplejos}}.", "c": "El tipo IV es {{celular}}.", "d": "El tipo I es alergia ({{IgE}})."}, "_k": "inmuno-q88:133252051"}, {"id": "inmuno-q89", "tema": "Alergia/Hipersensibilidad", "examen": "2º Parcial 2025 (Bloque B)", "anio": 2025, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "En relación a la **anemia hemolítica autoinmune (AHA)**, ¿qué afirmación es **FALSA**?", "opciones": {"a": "Puede asociarse a neumonía atípica", "b": "La hemólisis se produce por fagocitosis de macrófagos con receptores Fc o C3b", "c": "Mycoplasma pneumoniae induce anticuerpos contra el antígeno I", "d": "Los autoanticuerpos propios de la AHA no se encuentran en la mayoría de individuos sanos"}, "correcta": "d", "razones": {"a": "Cierta: se asocia a la neumonía atípica por {{Mycoplasma}}.", "b": "Cierta: la hemólisis es por {{fagocitosis}} (receptores Fc/C3b).", "c": "Cierta: Mycoplasma induce Acs anti-{{antígeno I}}.", "d": "FALSA (= respuesta). Los anticuerpos fríos anti-I de bajo título {{SÍ}} están presentes en la mayoría de individuos sanos ({{anticuerpos naturales}}); en la AHA aumentan y se vuelven patógenos."}, "_k": "inmuno-q89:951830162"}, {"id": "inmuno-q90", "tema": "Alergia/Hipersensibilidad", "examen": "Recull + Verdaguer + Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida (EHRN, concepto trampa)", "enunciado": "En la **enfermedad hemolítica del recién nacido**, ¿por qué mecanismo se destruyen mayoritariamente los hematíes?", "opciones": {"a": "Linfocitos T CD8+ citotóxicos", "b": "Fagocitosis", "c": "Células NK", "d": "Activación del complemento"}, "correcta": "b", "razones": {"a": "Los CD8+ no median la destrucción de hematíes opsonizados por {{IgG}}.", "b": "CORRECTA. Los hematíes fetales opsonizados por {{IgG anti-Rh}} maternas se destruyen por {{fagocitosis esplénica}} (hemólisis extravascular).", "c": "Las {{NK}} no son el mecanismo principal.", "d": "FALSO (trampa): el Rh es escaso y la IgG queda muy separada para fijar {{complemento}} eficazmente."}, "_k": "inmuno-q90:1556786063"}, {"id": "inmuno-q91", "tema": "Alergia/Hipersensibilidad", "examen": "2º Parcial 2025 (Bloque B) + Recull", "anio": 2025, "parcial": 2, "alta_frecuencia": true, "repetida": "Repetida (EHRN, concepto trampa)", "enunciado": "De las siguientes afirmaciones, ¿cuál es **FALSA**?", "opciones": {"a": "Un Coombs indirecto 1/32 tiene peor pronóstico que 1/4", "b": "Se administra Rhogam (anti-Rh) a las 28 semanas", "c": "En la enfermedad hemolítica del recién nacido los hematíes se destruyen por activación del complemento", "d": "Se puede hacer transfusión intrauterina de hematíes grupo 0 Rh negativo por vena umbilical"}, "correcta": "c", "razones": {"a": "Cierta: mayor título (1/32) = {{peor}} pronóstico que 1/4.", "b": "Cierta: el {{Rhogam}} se administra a las 28 semanas (y 72h posparto).", "c": "FALSA (= respuesta). En la EHRN los hematíes se destruyen por {{fagocitosis}} (IgG anti-Rh opsoniza → bazo), NO por activación del complemento.", "d": "Cierta: la transfusión intrauterina con {{0 Rh-}} es una opción terapéutica."}, "_k": "inmuno-q91:2521137001"}, {"id": "inmuno-q92", "tema": "Alergia/Hipersensibilidad", "examen": "Biomed", "anio": 2018, "parcial": 2, "alta_frecuencia": false, "repetida": "", "enunciado": "Sobre la profilax
